<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>History</title>
    <link rel="stylesheet" href="../css/History.css">
    <link rel="stylesheet" href="../css/components/Header.css">
    <link rel="stylesheet" href="../css/components/Footer.css">
</head>
<body>
<header xlu-include-file="components/Header.html"></header>

<main class="reservations-main">

    <div class="section-header">
        <button class="back-btn" onclick="history.back()">&#8592;</button>
        <h2>Active reservations:</h2>
    </div>
    <div class="cards-container" id="activeList">
        <p class="loading-hint">Cargando...</p>
    </div>

    <div class="section-header past-header">
        <h2>Past reservations:</h2>
    </div>
    <div class="cards-container" id="pastList">
        <p class="loading-hint">Cargando...</p>
    </div>

</main>

<footer xlu-include-file="components/Footer.html"></footer>

<script src="../javascript/scripts/xlu-include-file.js"></script>
<script>
    xLuIncludeFile();
</script>

<script type="module">
    import FirebaseDb from "../javascript/FirebaseDb.js";

    const userId = sessionStorage.getItem("userId");
    if (!userId) window.location.href = "Login.html";

    const db = await FirebaseDb.create();

    // Cargar reservas activas y pasadas
    const active = await db.getUserReservations(userId, "active");
    const cancelled = await db.getUserReservations(userId, "cancelled");
    const done = await db.getUserReservations(userId, "done");
    const past = [...done, ...cancelled];

    renderActive(active);
    renderPast(past);

    function renderActive(reservations) {
        const list = document.getElementById("activeList");
        if (reservations.length === 0) {
            list.innerHTML = `<p class="loading-hint">No tienes reservas activas.</p>`;
            return;
        }
        list.innerHTML = reservations.map(r => `
            <article class="reservation-card" data-id="${r.id}">
                <div class="card-info">
                    <p><strong>Gym / Pro:</strong> ${r.gymOrProId}</p>
                    <p><strong>Activity:</strong> ${r.activityId}</p>
                    <p><strong>Created:</strong> ${r.createdAt?.toDate?.().toLocaleDateString() ?? "—"}</p>
                </div>
                <div class="card-status">
                    <p>Paid: ${r.paid ? "✓" : "Pendiente"}</p>
                </div>
                <div class="card-actions">
                    <button class="icon-btn share-icon" title="Compartir">
                        <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none">
                            <circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/>
                            <line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/>
                        </svg>
                    </button>
                    <button class="action-btn cancel-btn" data-id="${r.id}">Cancel</button>
                </div>
            </article>`).join("");

        // Eventos Cancel
        list.querySelectorAll(".cancel-btn").forEach(btn => {
            btn.addEventListener("click", async () => {
                if (!confirm("¿Seguro que quieres cancelar esta reserva?")) return;
                try {
                    await db.cancelReservation(btn.dataset.id);
                    btn.closest(".reservation-card").remove();
                } catch (e) {
                    alert(e === "Cancel limit passed"
                        ? "No puedes cancelar, ha pasado el límite de cancelación."
                        : "Error al cancelar.");
                }
            });
        });
    }

    function renderPast(reservations) {
        const list = document.getElementById("pastList");
        if (reservations.length === 0) {
            list.innerHTML = `<p class="loading-hint">No tienes reservas pasadas.</p>`;
            return;
        }
        list.innerHTML = reservations.map(r => `
            <article class="reservation-card past-card" data-id="${r.id}">
                <div class="card-info">
                    <p><strong>Gym / Pro:</strong> ${r.gymOrProId}</p>
                    <p><strong>Activity:</strong> ${r.activityId}</p>
                    <p><strong>Created:</strong> ${r.createdAt?.toDate?.().toLocaleDateString() ?? "—"}</p>
                </div>
                <div class="card-status">
                    <p>Paid: ${r.paid ? "✓" : "—"}</p>
                </div>
                <div class="card-actions past-actions">
                    <div class="stars" data-target="${r.gymOrProId}">
                        <span data-value="1">★</span><span data-value="2">★</span>
                        <span data-value="3">★</span><span data-value="4">★</span><span data-value="5">★</span>
                    </div>
                    <div class="action-row">
                        <button class="action-btn signup-btn">Sign up again</button>
                        <button class="icon-btn share-icon">
                            <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none">
                                <circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/>
                                <line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/>
                            </svg>
                        </button>
                        <span class="status-text">${r.status === "done" ? "Done" : "Cancelled"}</span>
                    </div>
                </div>
            </article>`).join("");

        // Estrellas de valoración en reservas pasadas
        list.querySelectorAll(".stars").forEach(starsEl => {
            const spans = starsEl.querySelectorAll("span");
            const targetId = starsEl.dataset.target;
            let selected = 0;

            spans.forEach(s => {
                s.addEventListener("mouseover", () => highlight(+s.dataset.value));
                s.addEventListener("mouseout", () => highlight(selected));
                s.addEventListener("click", async () => {
                    selected = +s.dataset.value;
                    highlight(selected);
                    try {
                        await db.rateTarget(targetId, "gym", selected);
                    } catch {
                        await db.rateTarget(targetId, "professional", selected);
                    }
                });
            });

            function highlight(n) {
                spans.forEach(s => s.classList.toggle("active", +s.dataset.value <= n));
            }
        });
    }
</script>
</body>
</html>
