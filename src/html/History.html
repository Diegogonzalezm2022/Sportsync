<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>History</title>
    <link rel="stylesheet" href="../css/History.css">
    <link rel="stylesheet" href="../css/components/Header.css">
    <link rel="stylesheet" href="../css/components/Footer.css">
</head>
<body>
<header xlu-include-file="components/Header.html"></header>

<main class="reservations-main">

    <div class="section-header">
        <button class="back-btn" onclick="history.back()">&#8592;</button>
        <h2>Active reservations:</h2>
    </div>
    <div class="cards-container" id="activeList">
        <p class="loading-hint">Cargando...</p>
    </div>

    <div class="section-header past-header">
        <h2>Past reservations:</h2>
    </div>
    <div class="cards-container" id="pastList">
        <p class="loading-hint">Cargando...</p>
    </div>
</main>

<footer class="main-footer">
    <div class="footer-links">
        <a href="https://github.com/Diegogonzalezm2022/Sportsync">Link GitHub</a>
        <a href="https://www.figma.com/design/932AGbsgEWwMm1Z0YmgsVN/PS_Grupo10?node-id=0-1&p=f&t=l3bNIiRxuAhtjPYc-0">Link Figma</a>
        <a href="Index.html">Home</a>
        <a href="AboutUs.html">About Us</a>
    </div>
    <div class="footer-logo"><strong>Logo</strong></div>
    <div class="footer-contact">
        <a href="mailto:cathaysa.moreno101@alu.ulpgc.es">Link Email</a>
        <a href="https://wa.me/+34628193554">Link Phone</a>
        <div class="team-link"><a href="OurTeam.html">Our Team</a></div>
    </div>
</footer>

<script src="../javascript/scripts/xlu-include-file.js"></script>
<script>
    xLuIncludeFile();
</script>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-app.js";
    import { getFirestore, collection, query, where, getDocs, doc, getDoc, updateDoc }
        from "https://www.gstatic.com/firebasejs/11.6.0/firebase-firestore.js";

    const userId = sessionStorage.getItem("userId");
    if (!userId) window.location.href = "Login.html";

    const response = await fetch("../assets/firebaseConfig.json");
    const firebaseConfig = await response.json();
    const app = initializeApp(firebaseConfig);
    const db  = getFirestore(app);

    // ── Cargar reservas del usuario ───────────────────────
    async function loadReservations() {
        const snap = await getDocs(query(
            collection(db, "reservations"),
            where("userId", "==", userId)
        ));

        const reservations = [];
        snap.forEach(d => reservations.push({ id: d.id, ...d.data() }));

        // Cargar nombres de gym/profesional y actividad para cada reserva
        const enriched = await Promise.all(reservations.map(async r => {
            let ownerName = r.gymOrProId;
            let activityName = r.activityId;

            // Nombre del gym o profesional
            try {
                const colName = r.ownerType === "gym" ? "gyms" : "professionals";
                const ownerSnap = await getDoc(doc(db, colName, r.gymOrProId));
                if (ownerSnap.exists()) ownerName = ownerSnap.data().name || r.gymOrProId;
            } catch {}

            // Nombre de la actividad
            try {
                const actSnap = await getDoc(doc(db, "activities", r.activityId));
                if (actSnap.exists()) {
                    const actData = actSnap.data();
                    activityName = actData.name || r.activityId;
                    r.activitySchedule = actData.schedule || "—";
                    r.activityPrice    = actData.price    || "—";
                }
            } catch {}

            return { ...r, ownerName, activityName };
        }));

        const active    = enriched.filter(r => r.status === "active");
        const cancelled = enriched.filter(r => r.status === "cancelled");
        const done      = enriched.filter(r => r.status === "done");
        const past      = [...done, ...cancelled];

        renderActive(active);
        renderPast(past);
    }

    // ── Renderizar activas ────────────────────────────────
    function renderActive(reservations) {
        const list = document.getElementById("activeList");
        if (reservations.length === 0) {
            list.innerHTML = `<p class="loading-hint">No tienes reservas activas.</p>`;
            return;
        }
        list.innerHTML = reservations.map(r => `
            <article class="reservation-card" data-id="${r.id}">
                <div class="card-info">
                    <p><strong>${r.ownerType === "gym" ? "Gym" : "Professional"}:</strong> ${r.ownerName}</p>
                    <p><strong>Activity:</strong> ${r.activityName}</p>
                    <p><strong>Schedule:</strong> ${formatSchedule(r.activitySchedule)}</p>
                </div>
                <div class="card-status">
                    <p>Paid: ${r.paid ? "✓" : "Pendiente"}</p>
                </div>
                <div class="card-actions">
                    <button class="icon-btn share-icon" title="Compartir" onclick="shareReservation('${r.ownerName}', '${r.activityName}')">
                        <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none">
                            <circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/>
                            <line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/>
                            <line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/>
                        </svg>
                    </button>
                    <button class="action-btn cancel-btn" data-id="${r.id}">Cancel</button>
                </div>
            </article>`).join("");

        list.querySelectorAll(".cancel-btn").forEach(btn => {
            btn.addEventListener("click", async () => {
                if (!confirm("¿Seguro que quieres cancelar esta reserva?")) return;
                try {
                    await updateDoc(doc(db, "reservations", btn.dataset.id), { status: "cancelled" });
                    btn.closest(".reservation-card").remove();
                    const activeList = document.getElementById("activeList");
                    if (!activeList.querySelector(".reservation-card")) {
                        activeList.innerHTML = `<p class="loading-hint">No tienes reservas activas.</p>`;
                    }
                } catch (e) {
                    alert("Error al cancelar la reserva.");
                }
            });
        });
    }

    // ── Renderizar pasadas ────────────────────────────────
    function renderPast(reservations) {
        const list = document.getElementById("pastList");
        if (reservations.length === 0) {
            list.innerHTML = `<p class="loading-hint">No tienes reservas pasadas.</p>`;
            return;
        }
        list.innerHTML = reservations.map(r => `
            <article class="reservation-card past-card" data-id="${r.id}">
                <div class="card-info">
                    <p><strong>${r.ownerType === "gym" ? "Gym" : "Professional"}:</strong> ${r.ownerName}</p>
                    <p><strong>Activity:</strong> ${r.activityName}</p>
                    <p><strong>Schedule:</strong> ${formatSchedule(r.activitySchedule)}</p>
                </div>
                <div class="card-status">
                    <p>Paid: ${r.paid ? "✓" : "—"}</p>
                </div>
                <div class="card-actions past-actions">
                    <div class="stars" data-target-id="${r.gymOrProId}" data-owner-type="${r.ownerType}">
                        <span data-value="1">★</span><span data-value="2">★</span>
                        <span data-value="3">★</span><span data-value="4">★</span><span data-value="5">★</span>
                    </div>
                    <div class="action-row">
                        <button class="action-btn signup-btn">Sign up again</button>
                        <button class="icon-btn share-icon" onclick="shareReservation('${r.ownerName}', '${r.activityName}')">
                            <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none">
                                <circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/>
                                <line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/>
                                <line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/>
                            </svg>
                        </button>
                        <span class="status-text">${r.status === "done" ? "Done" : "Cancelled"}</span>
                    </div>
                </div>
            </article>`).join("");

        // Estrellas valoración
        list.querySelectorAll(".stars").forEach(starsEl => {
            const spans      = starsEl.querySelectorAll("span");
            const targetId   = starsEl.dataset.targetId;
            const ownerType  = starsEl.dataset.ownerType;
            let selected     = 0;

            spans.forEach(s => {
                s.addEventListener("mouseover", () => highlight(+s.dataset.value));
                s.addEventListener("mouseout",  () => highlight(selected));
                s.addEventListener("click", async () => {
                    selected = +s.dataset.value;
                    highlight(selected);
                    try {
                        const colName    = ownerType === "gym" ? "gyms" : "professionals";
                        const targetRef  = doc(db, colName, targetId);
                        const targetSnap = await getDoc(targetRef);
                        if (targetSnap.exists()) {
                            const { rating = 0, ratingCount = 0 } = targetSnap.data();
                            await updateDoc(targetRef, {
                                rating: ((rating * ratingCount) + selected) / (ratingCount + 1),
                                ratingCount: ratingCount + 1
                            });
                        }
                    } catch (e) { console.error(e); }
                });
            });

            function highlight(n) {
                spans.forEach(s => s.classList.toggle("active", +s.dataset.value <= n));
            }
        });
    }

    // ── Helpers ───────────────────────────────────────────
    function formatSchedule(schedule) {
        if (!schedule) return "—";
        if (typeof schedule === "object" && schedule.seconds) {
            return new Date(schedule.seconds * 1000).toLocaleDateString("es-ES", {
                weekday: "long", day: "numeric", month: "long", year: "numeric"
            });
        }
        return schedule;
    }

    function shareReservation(ownerName, activityName) {
        if (navigator.share) {
            navigator.share({
                title: "Mi reserva en SportSync",
                text: `Me he apuntado a ${activityName} en ${ownerName}`,
                url: window.location.href
            });
        } else {
            navigator.clipboard.writeText(`Me he apuntado a ${activityName} en ${ownerName}`);
            alert("Copiado al portapapeles");
        }
    }

    // ── Arrancar ──────────────────────────────────────────
    loadReservations();
</script>
</body>
</html>
