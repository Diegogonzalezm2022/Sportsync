<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit-My-Profile-SportSync</title>
    <link rel="stylesheet" href="../css/EditProfile.css">
    <link rel="stylesheet" href="../css/components/Header.css">
    <link rel="stylesheet" href="../css/components/Footer.css">
    <script src="../javascript/scripts/xlu-include-file.js"></script>
</head>
<body>
<header xlu-include-file="components/Header.html"></header>

<main class="profile-main">

    <div class="profile-header">
        <button class="back-btn" onclick="window.location.href='ActivitySearch.html'" aria-label="Volver">&#8592;</button>
        <div class="avatar-circle">
            <svg viewBox="0 0 24 24" width="40" height="40" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                <circle cx="12" cy="7" r="4"></circle>
            </svg>
        </div>
    </div>

    <form class="profile-form">

        <div class="form-group">
            <label for="username">Username</label>
            <input type="text" id="username" name="username" placeholder="Example">
        </div>

        <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" name="email" placeholder="example@mail.com">
        </div>

        <div class="form-group">
            <label for="phone">Phone number</label>
            <input type="tel" id="phone" name="phone" placeholder="+34 123 456 789">
        </div>

        <div class="form-group inline-group">
            <label for="payment-method">Payment method:</label>
            <div class="select-wrapper">
                <select id="payment-method" name="payment-method">
                    <option value="" disabled selected></option>
                    <option value="card">Credit Card</option>
                    <option value="paypal">PayPal</option>
                    <option value="bizum">Bizum</option>
                </select>
            </div>
        </div>

        <div class="form-group">
            <input type="text" id="payment-details" name="payment-details" placeholder="Payment method specific fields">
        </div>

        <div class="form-actions">
            <button onclick="window.location.href='EditProfile.html'" type="submit" class="save-btn">Save Changes</button>
        </div>

    </form>
</main>

<footer xlu-include-file="components/Footer.html"></footer>

<script>
    xLuIncludeFile();
</script>


</body>
</html>
