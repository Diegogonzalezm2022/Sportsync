<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Profile</title>
    <link rel="stylesheet" href="../css/EditProfile.css">
    <link rel="stylesheet" href="../css/components/Header.css">
    <link rel="stylesheet" href="../css/components/Footer.css">
</head>
<body>
<header xlu-include-file="components/Header.html"></header>

<main class="profile-main">

    <div class="profile-header">
        <button class="back-btn" onclick="history.back()">&#8592;</button>

        <!-- Foto de perfil clicable -->
        <div class="avatar-circle" id="avatarCircle" style="cursor:pointer; position:relative; overflow:hidden;">
            <img id="avatarPreview" src="" alt="Foto de perfil"
                 style="display:none; width:100%; height:100%; object-fit:cover; border-radius:50%; position:absolute; inset:0;">
            <svg id="avatarSvg" viewBox="0 0 24 24" width="40" height="40" stroke="currentColor" stroke-width="2" fill="none">
                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                <circle cx="12" cy="7" r="4"/>
            </svg>
            <span style="position:absolute;bottom:0;left:0;right:0;background:rgba(0,0,0,0.45);color:#fff;font-size:10px;text-align:center;padding:3px 0;">Cambiar</span>
        </div>
        <input type="file" id="photoInput" accept="image/*" hidden>
    </div>

    <div id="saveMsg" style="display:none; background:#d8f3dc; color:#2d6a4f; border-radius:8px; padding:10px 16px; font-size:0.85rem; margin-bottom:8px;">
        ✓ Cambios guardados correctamente
    </div>
    <div id="errorMsg" style="display:none; background:#fdecea; color:#c0392b; border-radius:8px; padding:10px 16px; font-size:0.85rem; margin-bottom:8px;"></div>

    <div class="profile-form">

        <div class="form-group">
            <label for="username">Usuario</label>
            <input type="text" id="username" name="username" placeholder="Ejemplo">
        </div>

        <div class="form-group">
            <label for="bio">Biografía</label>
            <textarea id="bio" name="bio" placeholder="Cuéntanos algo sobre ti..."
                      style="width:100%; padding:9px 12px; border:1px solid #d6d6d6; border-radius:8px;
                font-family:inherit; font-size:0.88rem; resize:vertical; min-height:80px; outline:none;"></textarea>
        </div>

        <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" name="email" placeholder="ejemplo@mail.com">
        </div>

        <div class="form-group">
            <label for="phone">Teléfono</label>
            <input type="tel" id="phone" name="phone" placeholder="+34 123 456 789">
        </div>

        <div class="form-group inline-group">
            <label for="payment-method">Método de pago:</label>
            <div class="select-wrapper">
                <select id="payment-method" name="payment-method">
                    <option value="" disabled selected>Selecciona</option>
                    <option value="card">Tarjeta de Crédito</option>
                    <option value="paypal">PayPal</option>
                    <option value="bizum">Bizum</option>
                    <option value="efectivo">Efectivo</option>
                </select>
            </div>
        </div>

        <div class="form-group">
            <input type="text" id="payment-details" name="payment-details" placeholder="Número de tarjeta o email de PayPal...">
        </div>

        <div class="form-actions">
            <button type="button" class="save-btn" id="saveBtn">Guardar Cambios</button>
        </div>

    </div>
</main>

<footer xlu-include-file="components/Footer.html"></footer>

<script src="../javascript/scripts/xlu-include-file.js"></script>
<script>
    xLuIncludeFile();
</script>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-app.js";
    import { getFirestore, doc, getDoc, updateDoc }
        from "https://www.gstatic.com/firebasejs/11.6.0/firebase-firestore.js";

    const userId = sessionStorage.getItem("userId");
    if (!userId) window.location.href = "Login.html";

    const response = await fetch("../assets/firebaseConfig.json");
    const firebaseConfig = await response.json();
    const app = initializeApp(firebaseConfig);
    const db  = getFirestore(app);

    // ── Cargar datos actuales del usuario ─────────────────
    const userSnap = await getDoc(doc(db, "users", userId));
    if (userSnap.exists()) {
        const data = userSnap.data();
        document.getElementById("username").value        = data.username       || "";
        document.getElementById("bio").value             = data.bio            || "";
        document.getElementById("email").value           = data.email          || "";
        document.getElementById("phone").value           = data.phone          || "";
        document.getElementById("payment-method").value = data.paymentMethod  || "";
        document.getElementById("payment-details").value= data.paymentDetails || "";

        if (data.photoURL) {
            const preview = document.getElementById("avatarPreview");
            preview.src = data.photoURL;
            preview.style.display = "block";
            document.getElementById("avatarSvg").style.display = "none";
        }
    }

    // ── Foto de perfil — preview local ───────────────────
    let newPhotoBase64 = null;

    document.getElementById("avatarCircle").addEventListener("click", () => {
        document.getElementById("photoInput").click();
    });

    document.getElementById("photoInput").addEventListener("change", function () {
        const file = this.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = e => {
            newPhotoBase64 = e.target.result; // base64
            const preview = document.getElementById("avatarPreview");
            preview.src = newPhotoBase64;
            preview.style.display = "block";
            document.getElementById("avatarSvg").style.display = "none";
        };
        reader.readAsDataURL(file);
    });

    // ── Guardar cambios ───────────────────────────────────
    document.getElementById("saveBtn").addEventListener("click", async () => {
        const saveMsg  = document.getElementById("saveMsg");
        const errorMsg = document.getElementById("errorMsg");
        saveMsg.style.display  = "none";
        errorMsg.style.display = "none";

        const username       = document.getElementById("username").value.trim();
        const bio            = document.getElementById("bio").value.trim();
        const phone          = document.getElementById("phone").value.trim();
        const paymentMethod  = document.getElementById("payment-method").value;
        const paymentDetails = document.getElementById("payment-details").value.trim();

        if (!username) {
            errorMsg.textContent = "El nombre de usuario no puede estar vacío.";
            errorMsg.style.display = "block";
            return;
        }

        try {
            const updateData = {
                username,
                bio,
                phone,
                paymentMethod,
                paymentDetails
            };

            // Guardar foto en base64 en Firestore si se cambió
            // Nota: para fotos grandes en producción usar Firebase Storage
            if (newPhotoBase64) {
                updateData.photoURL = newPhotoBase64;
            }

            await updateDoc(doc(db, "users", userId), updateData);

            saveMsg.style.display = "block";
            setTimeout(() => {
                window.location.href = "ProfileUser.html";
            }, 1500);

        } catch (e) {
            console.error(e);
            errorMsg.textContent = "Error al guardar los cambios. Inténtalo de nuevo.";
            errorMsg.style.display = "block";
        }
    });
</script>
</body>
</html>
