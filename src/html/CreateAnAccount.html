<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Create-An-Account-SportSync</title>
    <link rel="stylesheet" href="../css/CreateAnAccount.css">
</head>
<body>
<main class="register-container">

    <section class="form-section">
        <h2>Create an Account</h2>

        <form action="#" method="post" class="register-form">

            <label>Email</label>
            <input type="email" name="email" placeholder="example@gmail.com" required>

            <label>Name</label>
            <input type="text" name="name" placeholder="example" required>


            <label>Surname</label>
            <input type="text" Surname="Surname" placeholder="example" required>

            <label>User</label>
            <input type="text" name="username" placeholder="example" required>

            <label>Password</label>
            <input type="password" name="password" required>

            <label>Repeat password</label>
            <input type="password" name="password" required>

            <button type="submit" class="btn-register">Register</button>
        </form>
    </section>

    <section class="photo-section">
        <div class="photo-box">
            <p>Add Photo</p>
        </div>
    </section>

    </main>
</body>
</html>
