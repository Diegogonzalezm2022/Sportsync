<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create An Account - SportSync</title>
    <link rel="stylesheet" href="../css/CreateAnAccount.css">
    <link rel="stylesheet" href="../css/components/Header.css">
    <link rel="stylesheet" href="../css/components/Footer.css">
</head>
<body>
<header xlu-include-file="components/Header.html"></header>

<main class="register-container">

    <section class="form-section">
        <h2>Crea una cuenta</h2>
        <div id="registerError" class="login-error" style="display:none;"></div>
        <div class="register-form">

            <label>Email</label>
            <input type="email" id="email" placeholder="ejemplo@gmail.com">

            <label>Nombre</label>
            <input type="text" id="name" placeholder="Pepe">

            <label>Apellido</label>
            <input type="text" id="surname" placeholder="Molina Hernández">

            <label>Nombre de usuario</label>
            <input type="text" id="username" placeholder="Pepito99">

            <label>Contraseña</label>
            <input type="password" id="password">

            <label>Repite contraseña</label>
            <input type="password" id="passwordRepeat">

            <button class="btn-register" id="registerBtn">Registrar</button>
        </div>
    </section>

    <section class="photo-section">
        <div class="photo-box">
            <img src="../assets/imagenes/sporty_login_register.png" alt="">
        </div>
    </section>

</main>

<footer xlu-include-file="components/Footer.html"></footer>

<script src="../javascript/scripts/xlu-include-file.js"></script>
<script>
    xLuIncludeFile();
</script>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-app.js";
    import { getAuth, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-auth.js";
    import { getFirestore, doc, setDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-firestore.js";

    const response = await fetch("../assets/firebaseConfig.json");
    const firebaseConfig = await response.json();
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    // Leer el rol elegido en RegisterAs.html (guardado en sessionStorage)
    const role = sessionStorage.getItem("registerRole") || "user";

    document.getElementById("registerBtn").addEventListener("click", async () => {
        const email = document.getElementById("email").value.trim();
        const name = document.getElementById("name").value.trim();
        const surname = document.getElementById("surname").value.trim();
        const username = document.getElementById("username").value.trim();
        const password = document.getElementById("password").value;
        const passwordRepeat = document.getElementById("passwordRepeat").value;
        const errorEl = document.getElementById("registerError");

        errorEl.style.display = "none";

        if (!email || !name || !surname || !username || !password || !passwordRepeat) {
            errorEl.textContent = "Por favor rellena todos los campos.";
            errorEl.style.display = "block";
            return;
        }
        if (password !== passwordRepeat) {
            errorEl.textContent = "Las contraseñas no coinciden.";
            errorEl.style.display = "block";
            return;
        }
        if (password.length < 6) {
            errorEl.textContent = "La contraseña debe tener al menos 6 caracteres.";
            errorEl.style.display = "block";
            return;
        }

        try {
            const userCredential = await createUserWithEmailAndPassword(auth, email, password);
            const uid = userCredential.user.uid;

            // Guardar datos sin rol todavía
            await setDoc(doc(db, "users", uid), {
                name,
                surname,
                username,
                email,
                createdAt: serverTimestamp()
                // NO guardamos role aquí, lo elegirá en el popup
            });

            sessionStorage.setItem("userId", uid);
            sessionStorage.setItem("userEmail", email);

            // Redirigir a Login para que aparezca el popup de rol
            // pero marcamos que viene del registro para forzar el popup
            sessionStorage.setItem("showRolePopup", "true");
            window.location.href = "Login.html";

        } catch (e) {
            errorEl.style.display = "block";
            errorEl.textContent =
                e.code === "auth/email-already-in-use"
                    ? "Este email ya está registrado."
                    : "Error al registrarse. Inténtalo de nuevo.";
        }
    });
</script>
<script type="module" src="../javascript/app/Header.js"></script>
</body>
</html>
