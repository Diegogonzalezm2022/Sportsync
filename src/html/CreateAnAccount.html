<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Create-An-Account-SportSync</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../css/CreateAnAccount.css">
    <link rel="stylesheet" href="../css/components/Header.css">
    <link rel="stylesheet" href="../css/components/Footer.css">
    <script src="../javascript/scripts/xlu-include-file.js"></script>
</head>
<body>
<header xlu-include-file="components/Header.html"></header>

<main class="register-container">

    <section class="form-section">
        <h2>Create an Account</h2>

        <form action="#" method="post" class="register-form">

            <label>Email</label>
            <input type="email" name="email" placeholder="example@gmail.com" required>

            <label>Name</label>
            <input type="text" name="name" placeholder="example" required>


            <label>Surname</label>
            <input type="text" Surname="Surname" placeholder="example" required>

            <label>User</label>
            <input type="text" name="username" placeholder="example" required>

            <label>Password</label>
            <input type="password" name="password" required>

            <label>Repeat password</label>
            <input type="password" name="password" required>

            <button onclick="window.location.href='Login.html'" type="submit" class="btn-register">Register</button>
        </form>
    </section>

    <section class="photo-section">
        <div class="photo-box">
            <img src="../assets/imagenes/sporty_login_register.png" alt="">
        </div>
    </section>

    </main>
<footer xlu-include-file="components/Footer.html"></footer>
<script>
    xLuIncludeFile()
</script>
</body>
</html>
