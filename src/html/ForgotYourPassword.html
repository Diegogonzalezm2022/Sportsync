<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ForgotYourPassword</title>
    <link rel="stylesheet" href="../css/components/Header.css">
    <link rel="stylesheet" href="../css/components/Footer.css">
    <link rel="stylesheet" href="../css/ForgotYourPassword.css">
    <script src="../javascript/scripts/xlu-include-file.js"></script>
</head>
<body>
<header xlu-include-file="components/Header.html"></header>
<div class="container">
    <h1>Recupera tu contraseña</h1>
    <div id="errorMsg" class="login-error" style="display:none;"></div>
    <div id="successMsg" class="login-success" style="display:none;"></div>
    <form class="form-wrapper">
        <div class="input-group">
            <label for="email">Email</label>
            <input type="email" id="email" ...>
        </div>

        <button id="continueBtn" type="button" class="btn-continue">Continuar</button>
    </form>

</div>
<footer xlu-include-file="components/Footer.html"></footer>
<script>
   xLuIncludeFile()
</script>

<script type="module">
   import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-app.js";
   import { getAuth, sendPasswordResetEmail } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-auth.js";

   const firebaseConfig = {
       apiKey: "AIzaSyBe7Muffm1j7b8apziWK13B_54q6DCaUT0",
       authDomain: "proyecto2026ps.firebaseapp.com",
       projectId: "proyecto2026ps",
       storageBucket: "proyecto2026ps.firebasestorage.app",
       messagingSenderId: "124816158835",
       appId: "1:124816158835:web:39a68c1772fa3427a33a06"
   };

   const app = initializeApp(firebaseConfig);
   const auth = getAuth(app);

   document.getElementById("continueBtn").addEventListener("click", async () => {
       const email = document.getElementById("email").value.trim();
       const errorEl = document.getElementById("errorMsg");
       const successEl = document.getElementById("successMsg");

       if (!email) {
           errorEl.textContent = "Please enter your email.";
           errorEl.style.display = "block";
           return;
       }

       try {
           await sendPasswordResetEmail(auth, email);
           successEl.textContent = "We have sent you an email to reset your password.";
           successEl.style.display = "block";
           errorEl.style.display = "none";

           // Espera 3 segundos y redirige al login
           setTimeout(() => {
               window.location.href = "Login.html";
           }, 10000);

       } catch (e) {
           errorEl.textContent = e.code === "auth/user-not-found"
               ? "No account found with that email."
               : "Error sending email. Please try again.";
           errorEl.style.display = "block";
       }
   });
</script>
<script type="module" src="../javascript/app/Header.js"></script>

</body>
</html>
