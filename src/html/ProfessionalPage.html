<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perfil Profesional</title>
    <link rel="stylesheet" href="../css/GymPage.css">
    <link rel="stylesheet" href="../css/components/Header.css">
    <link rel="stylesheet" href="../css/components/Footer.css">
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
    <style>
        .edit-mode-btn { margin-top:10px; padding:8px 15px; cursor:pointer; border-radius:5px; border:none; background:#f39c12; color:white; font-weight:bold; }
        .signup-btn--full { background:#d6d6d6 !important; color:#888 !important; cursor:not-allowed; }
        .star--active { color: #f1c40f !important; }

        /* ── Comentarios ── */
        .comments-section { margin: 24px 0; }
        .comments-toggle-btn {
            background: none; border: 1.5px solid #ddd; border-radius: 8px;
            padding: 7px 16px; font-size: 0.85rem; cursor: pointer; color: #555;
            transition: border-color 0.15s, color 0.15s;
        }
        .comments-toggle-btn:hover { border-color: #aaa; color: #222; }
        .comments-box { margin-top: 14px; }
        .comment-form { display: flex; gap: 8px; margin-bottom: 16px; }
        .comment-input {
            flex: 1; padding: 9px 12px; border: 1.5px solid #ddd;
            border-radius: 8px; font-size: 0.85rem; outline: none;
            font-family: inherit;
        }
        .comment-input:focus { border-color: #888; }
        .comment-submit-btn {
            padding: 9px 16px; border: none; border-radius: 8px;
            background: #1a1a1a; color: white; font-size: 0.85rem;
            cursor: pointer; white-space: nowrap;
        }
        .comment-submit-btn:hover { background: #333; }
        .comment-list { display: flex; flex-direction: column; gap: 10px; }
        .comment-item {
            background: #f8f8f8; border-radius: 10px;
            padding: 10px 14px; font-size: 0.85rem;
        }
        .comment-author { font-weight: 600; color: #333; margin-bottom: 3px; font-size: 0.8rem; }
        .comment-text { color: #444; line-height: 1.4; }
        .comment-date { font-size: 0.72rem; color: #aaa; margin-top: 4px; }
        .no-comments { font-size: 0.83rem; color: #aaa; font-style: italic; }
        .comment-delete-btn {
            background: none; border: none; cursor: pointer;
            color: #ccc; font-size: 0.75rem; float: right;
            padding: 0; line-height: 1;
        }
        .comment-delete-btn:hover { color: #e74c3c; }
    </style>
</head>
<body class="page--gym">

<header xlu-include-file="components/Header.html"></header>

<main class="profile-page-main">
    <button class="back-btn" onclick="history.back()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
    </button>

    <section class="top-section">
        <div class="profile-photo-block">
            <div class="profile-photo" id="profilePhotoBlock" style="position:relative;overflow:hidden;background:white;">
                <span class="photo-caption" id="photoCaption">Foto de Perfil</span>
                <img id="profilePhotoImg" src="" alt="" style="display:none;width:100%;height:100%;object-fit:cover;position:absolute;inset:0;">
            </div>
            <div class="schedule-block">
                <span class="schedule-label">Disponibilidad:</span>
                <div class="schedule-box">
                    <span class="schedule-days" id="scheduleDays">—</span>
                    <span class="schedule-hours" id="scheduleHours"></span>
                </div>
            </div>
        </div>

        <div class="info-block">
            <div class="info-row info-row--top">
                <div class="info-field">
                    <span class="info-label">Nombre del profesional:</span>
                    <div class="info-value info-value--name" id="profileName">—</div>
                </div>
                <div class="rating-block">
                    <span class="info-label">Valoración:</span>
                    <div class="stars" id="starsContainer">
                        <span class="star" data-value="1">★</span>
                        <span class="star" data-value="2">★</span>
                        <span class="star" data-value="3">★</span>
                        <span class="star" data-value="4">★</span>
                        <span class="star" data-value="5">★</span>
                    </div>
                    <span class="rating-hint" id="ratingHint">Valora este profesional</span>
                </div>
            </div>
            <div class="info-field">
                <span class="info-label">Sobre mí / Descripción:</span>
                <div class="info-value info-value--desc" id="profileDesc">—</div>
            </div>
            <div class="info-field">
                <span class="info-label">Contacto:</span>
                <div class="contact-lines" id="contactLines">—</div>
            </div>
            <div id="ownerControls" style="display:none; margin-top:10px;">
                <button class="edit-mode-btn" id="editBtn">✏️ Editar Perfil Profesional</button>
                <button class="edit-mode-btn-vetar" id="editBtnVet">🚫 Vetar Usuarios</button>
            </div>
        </div>
    </section>

    <section class="gallery-section">
        <div class="gallery-carousel-wrapper">
            <button class="carousel-arrow carousel-arrow--left" id="carouselLeft">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M15 18l-6-6 6-6"/></svg>
            </button>
            <div class="gallery-carousel" id="galleryCarousel"></div>
            <button class="carousel-arrow carousel-arrow--right" id="carouselRight">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M9 18l6-6-6-6"/></svg>
            </button>
        </div>
    </section>

    <section class="date-filter-section">
        <div class="date-btn-group">
            <button class="date-btn" id="dateFromBtn">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
                <span id="dateFromLabel">Fecha desde</span>
            </button>
            <input type="date" id="dateFromInput" class="date-input-hidden">
            <button class="date-btn" id="dateToBtn">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
                <span id="dateToLabel">Fecha hasta</span>
            </button>
            <input type="date" id="dateToInput" class="date-input-hidden">
        </div>
    </section>

    <section class="activities-section" id="activitiesSection">
        <p>Cargando clases...</p>
    </section>

    <!-- ── Sección comentarios ── -->
    <section class="comments-section">
        <button class="comments-toggle-btn" id="commentsToggleBtn">
            💬 Ver comentarios
        </button>
        <div class="comments-box" id="commentsBox" style="display:none;">
            <div class="comment-form" id="commentForm" style="display:none;">
                <textarea class="comment-input" id="commentInput" placeholder="Escribe tu comentario..." rows="2"></textarea>
                <button class="comment-submit-btn" id="commentSubmitBtn">Publicar</button>
            </div>
            <div class="comment-list" id="commentList">
                <p class="no-comments">Cargando comentarios...</p>
            </div>
        </div>
    </section>

</main>

<footer xlu-include-file="components/Footer.html"></footer>

<script src="../javascript/scripts/xlu-include-file.js"></script>
<script>xLuIncludeFile();</script>

<script type="module">
    import { initializeApp, getApps, getApp } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-app.js";
    import { getFirestore, doc, getDoc, collection, getDocs, addDoc, deleteDoc, query, where, updateDoc, serverTimestamp}
        from "https://www.gstatic.com/firebasejs/11.6.0/firebase-firestore.js";

    emailjs.init("bOhMQRr1h4BzhaNUT");

    const resp = await fetch("../assets/firebaseConfig.json");
    const firebaseConfig = await resp.json();
    const app = getApps().length > 0 ? getApp() : initializeApp(firebaseConfig);
    const db  = getFirestore(app);

    const userId  = sessionStorage.getItem("userId");
    const params  = new URLSearchParams(window.location.search);
    const ownerId = params.get("id") || sessionStorage.getItem("userId");
    const isOwner = (userId === ownerId);

    async function loadData() {
        const proSnap = await getDoc(doc(db, "professionals", ownerId));
        if (!proSnap.exists()) return;
        const d = proSnap.data();

        document.getElementById("profileName").textContent = d.name        || "—";
        document.getElementById("profileDesc").textContent = d.description || "—";
        document.getElementById("contactLines").textContent = d.contactInfo || "—";

        if (d.schedule) {
            if (typeof d.schedule === "object") {
                document.getElementById("scheduleDays").textContent  = d.schedule.days || "—";
                document.getElementById("scheduleHours").textContent =
                    (d.schedule.from && d.schedule.to) ? `${d.schedule.from}–${d.schedule.to}` : "";
            } else {
                document.getElementById("scheduleDays").textContent = d.schedule;
            }
        }

        if (d.photoURL) {
            document.getElementById("profilePhotoImg").src = d.photoURL;
            document.getElementById("profilePhotoImg").style.display = "block";
            document.getElementById("photoCaption").style.display = "none";
        }

        if (d.gallery && d.gallery.length > 0) {
            document.getElementById("galleryCarousel").innerHTML = d.gallery.map(src => `
                <div class="gallery-slot"><img src="${src}" style="width:100%;height:100%;object-fit:cover;"></div>`).join("");
        }

        if (d.rating) {
            const rounded = Math.round(d.rating);
            document.querySelectorAll(".star").forEach(s => {
                if (+s.dataset.value <= rounded) s.classList.add("star--active");
            });
            document.getElementById("ratingHint").textContent = `${d.rating.toFixed(1)} / 5`;
        }

        if (isOwner) {
            document.getElementById("ownerControls").style.display = "block";
            document.getElementById("starsContainer").style.pointerEvents = "none";
            document.getElementById("ratingHint").textContent = "Tu perfil";
            document.getElementById("editBtnVet").onclick = () =>
                window.location.href = `ViewReservation.html?id=${ownerId}&type=professional`;
            document.getElementById("editBtn").onclick = () =>
                window.location.href = `EditProfessionalPage.html?id=${ownerId}&type=professional`;
        } else {
            if (d.ratings && d.ratings[userId]) {
                const myPrev = d.ratings[userId];
                document.querySelectorAll(".star").forEach(s =>
                    s.classList.toggle("star--active", +s.dataset.value <= myPrev));
                document.getElementById("ratingHint").textContent = `Tu valoración: ${myPrev}/5`;
            }
            setupRating();
            document.getElementById("commentForm").style.display = "flex";
        }

        loadActivities();
    }

    function setupRating() {
        const stars = document.querySelectorAll(".star");
        stars.forEach(star => {
            star.addEventListener("mouseover", () =>
                stars.forEach(s => s.classList.toggle("star--active", +s.dataset.value <= +star.dataset.value)));
            star.addEventListener("mouseout", () => {
                const text = document.getElementById("ratingHint").textContent;
                const match = text.match(/[\d.]+/);
                const cur = match ? Math.round(parseFloat(match[0])) : 0;
                stars.forEach(s => s.classList.toggle("star--active", +s.dataset.value <= cur));
            });
            star.onclick = async () => {
                const val = +star.dataset.value;
                const ref = doc(db, "professionals", ownerId);
                const snap = await getDoc(ref);
                if (snap.exists()) {
                    const data = snap.data();
                    const ratings    = data.ratings    || {};
                    const prevRating = ratings[userId] || null;
                    let { rating = 0, ratingCount = 0 } = data;
                    if (prevRating !== null) {
                        const totalSinAnterior = (rating * ratingCount) - prevRating;
                        rating = ratingCount > 1 ? (totalSinAnterior + val) / ratingCount : val;
                    } else {
                        rating = ((rating * ratingCount) + val) / (ratingCount + 1);
                        ratingCount = ratingCount + 1;
                    }
                    await updateDoc(ref, { rating, ratingCount, [`ratings.${userId}`]: val });
                    location.reload();
                }
            };
        });
    }

    // ── Comentarios ───────────────────────────────────────
    let commentsLoaded = false;

    document.getElementById("commentsToggleBtn").addEventListener("click", async () => {
        const box = document.getElementById("commentsBox");
        const btn = document.getElementById("commentsToggleBtn");
        const visible = box.style.display !== "none";
        box.style.display = visible ? "none" : "block";
        btn.textContent = visible ? "💬 Ver comentarios" : "💬 Ocultar comentarios";
        if (!visible && !commentsLoaded) {
            await loadComments();
            commentsLoaded = true;
        }
    });
    async function loadComments() {
        const list = document.getElementById("commentList");
        try {
            const snap = await getDocs(query(
                collection(db, "comments"),
                where("targetId", "==", ownerId),
                where("targetType", "==", "professional")
            ));
            if (snap.empty) {
                list.innerHTML = `<p class="no-comments">Aún no hay comentarios. ¡Sé el primero!</p>`;
                return;
            }
            const comments = [];
            snap.forEach(d => comments.push({ id: d.id, ...d.data() }));
            comments.sort((a, b) => (b.createdAt?.seconds || 0) - (a.createdAt?.seconds || 0));

            list.innerHTML = "";
            comments.forEach(c => {
                const date = c.createdAt?.toDate ? c.createdAt.toDate().toLocaleDateString("es-ES") : "";
                const canDelete = (c.userId === userId) || isOwner;
                const div = document.createElement("div");
                div.className = "comment-item";
                div.innerHTML = `
                ${canDelete ? `<button class="comment-delete-btn" data-id="${c.id}" title="Eliminar">✕</button>` : ""}
                <div class="comment-author">${c.username || "Usuario"}</div>
                <div class="comment-text">${c.text}</div>
                <div class="comment-date">${date}</div>`;
                list.appendChild(div);
            });

            list.querySelectorAll(".comment-delete-btn").forEach(btn => {
                btn.addEventListener("click", async () => {
                    if (!confirm("¿Eliminar este comentario?")) return;
                    await deleteDoc(doc(db, "comments", btn.dataset.id));
                    btn.closest(".comment-item").remove();
                    if (!list.querySelector(".comment-item"))
                        list.innerHTML = `<p class="no-comments">Aún no hay comentarios.</p>`;
                });
            });
        } catch (e) {
            console.error(e);
            list.innerHTML = `<p class="no-comments">Error al cargar comentarios.</p>`;
        }
    }

    document.getElementById("commentSubmitBtn").addEventListener("click", async () => {
        const input = document.getElementById("commentInput");
        const text  = input.value.trim();
        if (!text) return;

        const btn = document.getElementById("commentSubmitBtn");
        btn.disabled = true; btn.textContent = "Publicando...";

        try {
            const userSnap = await getDoc(doc(db, "users", userId));
            const username = userSnap.exists()
                ? (userSnap.data().username || userSnap.data().name || "Usuario")
                : "Usuario";

            await addDoc(collection(db, "comments"), {
                targetId:   ownerId,
                targetType: "professional",
                userId,
                username,
                text,
                createdAt: serverTimestamp()
            });

            input.value = "";
            commentsLoaded = false;
            await loadComments();
            commentsLoaded = true;
        } catch (e) {
            console.error(e);
            alert("Error al publicar el comentario.");
        }
        btn.disabled = false; btn.textContent = "Publicar";
    });

    // ── Actividades ───────────────────────────────────────
    async function loadActivities(fromDate = null, toDate = null) {
        const container = document.getElementById("activitiesSection");
        const snap = await getDocs(query(collection(db, "activities"), where("ownerId", "==", ownerId)));

        const mySnap = await getDocs(query(
            collection(db, "reservations"),
            where("userId", "==", userId),
            where("status", "==", "active")));
        const myIds = new Set();
        mySnap.forEach(d => myIds.add(d.data().activityId));

        let acts = [];
        snap.forEach(d => acts.push({ id: d.id, ...d.data() }));

        if (fromDate || toDate) {
            acts = acts.filter(a => {
                const ad = new Date(a.date);
                if (fromDate && ad < new Date(fromDate)) return false;
                if (toDate && ad > new Date(toDate)) return false;
                return true;
            });
        }

        if (acts.length === 0) { container.innerHTML = "<p>No hay actividades disponibles.</p>"; return; }

        container.innerHTML = acts.map(a => {
            const done = myIds.has(a.id);
            const full = (a.availableSlots ?? a.slots ?? 0) <= 0;
            return `
            <div class="activity-card">
                <div class="activity-info">
                    <strong>${a.name}</strong><br>
                    <small>${a.date} | ${a.schedule}</small>
                </div>
                <div class="activity-right">
                    <span>${a.price}€</span><br>
                    <small>Cupo: ${a.availableSlots ?? a.slots}</small>
                </div>
                ${isOwner ? '<span>(Tuya)</span>' : `
                    <button class="signup-btn ${done ? 'signup-btn--done' : ''} ${full && !done ? 'signup-btn--full' : ''}"
                        ${done || full ? 'disabled' : ''}
                        onclick="window.book('${a.id}', '${a.name}', '${a.date}', '${a.schedule}', '${a.price}')">
                        ${done ? '✓' : full ? 'Lleno' : 'Apuntarme'}
                    </button>
                `}
            </div>`;
        }).join("");
    }

    window.book = async (id, name, date, time, price) => {
        try {
            const ref = doc(db, "activities", id);
            const s = await getDoc(ref);
            const slots = s.data().availableSlots ?? s.data().slots;
            if (slots > 0) {
                await addDoc(collection(db, "reservations"), {
                    userId, activityId: id, gymOrProId: ownerId,
                    ownerType: "professional", status: "active",
                    paid: false, createdAt: serverTimestamp()
                });
                await updateDoc(ref, { availableSlots: slots - 1 });
                emailjs.send("service_ak2mcnm", "template_czzg7qg", {
                    user_email: sessionStorage.getItem("userEmail"),
                    activity_name: name,
                    owner_name: document.getElementById("profileName").textContent
                });
                alert("Reserva completada");
                location.reload();
            }
        } catch (e) { console.error(e); }
    };

    document.getElementById("dateFromBtn").onclick = () =>
        document.getElementById("dateFromInput").showPicker?.() || document.getElementById("dateFromInput").click();
    document.getElementById("dateToBtn").onclick = () =>
        document.getElementById("dateToInput").showPicker?.() || document.getElementById("dateToInput").click();

    document.getElementById("dateFromInput").onchange = function () {
        const toVal = document.getElementById("dateToInput").value;
        if (toVal && this.value > toVal) {
            alert("La fecha desde no puede ser mayor que la fecha hasta.");
            this.value = "";
            document.getElementById("dateFromLabel").textContent = "Fecha desde";
            return;
        }
        const [y, m, d] = this.value.split("-");
        if (this.value) document.getElementById("dateFromLabel").textContent = `${d}/${m}/${y}`;
        loadActivities(this.value, toVal);
    };

    document.getElementById("dateToInput").onchange = function () {
        const fromVal = document.getElementById("dateFromInput").value;
        if (fromVal && this.value < fromVal) {
            alert("La fecha hasta no puede ser menor que la fecha desde.");
            this.value = "";
            document.getElementById("dateToLabel").textContent = "Fecha hasta";
            return;
        }
        const [y, m, d] = this.value.split("-");
        if (this.value) document.getElementById("dateToLabel").textContent = `${d}/${m}/${y}`;
        loadActivities(fromVal, this.value);
    };

    document.getElementById("carouselLeft").onclick = () =>
        document.getElementById("galleryCarousel").scrollBy({ left: -140, behavior: "smooth" });
    document.getElementById("carouselRight").onclick = () =>
        document.getElementById("galleryCarousel").scrollBy({ left: 140, behavior: "smooth" });

    loadData();
</script>
</body>
</html>
