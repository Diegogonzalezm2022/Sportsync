<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gym Profile</title>
    <link rel="stylesheet" href="../css/GymPage.css">
    <link rel="stylesheet" href="../css/components/Header.css">
    <link rel="stylesheet" href="../css/components/Footer.css">
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
    <style>
        /* Estilos para el modo edición */
        .edit-mode-btn { margin-top: 10px; padding: 8px 15px; cursor: pointer; border-radius: 5px; border: none; background: #f39c12; color: white; font-weight: bold; }
        .save-btn { background: #27ae60; display: none; }
        .editing { border: 1px dashed #f39c12; padding: 5px; background: #fffdf0; color: #333 !important; min-height: 20px; }

        /* Estilos para el Modal de Actividades */
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 2000; justify-content: center; align-items: center; }
        .modal-overlay.active { display: flex; }
        .modal-content { background: white; padding: 25px; border-radius: 12px; width: 90%; max-width: 400px; color: #333; }
        .modal-content h2 { margin-bottom: 15px; color: #f39c12; }
        .modal-form { display: flex; flex-direction: column; gap: 10px; }
        .modal-form label { font-weight: bold; font-size: 0.9rem; }
        .modal-form input { padding: 8px; border: 1px solid #ccc; border-radius: 4px; }
    </style>
</head>
<body class="page--gym">

<header xlu-include-file="components/Header.html"></header>

<main class="profile-page-main">
    <button class="back-btn" onclick="history.back()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
            <path d="M19 12H5M12 5l-7 7 7 7"/>
        </svg>
    </button>

    <section class="top-section">
        <div class="profile-photo-block">
            <div class="profile-photo">
                <svg class="photo-x" viewBox="0 0 200 160" xmlns="http://www.w3.org/2000/svg">
                    <line x1="0" y1="0" x2="200" y2="160" stroke="#ccc" stroke-width="1.2"/>
                    <line x1="200" y1="0" x2="0" y2="160" stroke="#ccc" stroke-width="1.2"/>
                </svg>
                <span class="photo-caption">Gym Profile</span>
            </div>
            <div class="schedule-block">
                <span class="schedule-label">Schedule:</span>
                <div class="schedule-box">
                    <span class="schedule-days" id="scheduleDays" contenteditable="false">—</span>
                    <span class="schedule-hours" id="scheduleHours" contenteditable="false">—</span>
                </div>
            </div>
        </div>

        <div class="info-block">
            <div class="info-row info-row--top">
                <div class="info-field">
                    <span class="info-label">Nombre del gimnasio:</span>
                    <div class="info-value info-value--name" id="profileName">—</div>
                </div>
                <div class="rating-block">
                    <span class="info-label">Puntuación media:</span>
                    <div class="stars" id="starsContainer">
                        <span class="star" data-value="1">★</span>
                        <span class="star" data-value="2">★</span>
                        <span class="star" data-value="3">★</span>
                        <span class="star" data-value="4">★</span>
                        <span class="star" data-value="5">★</span>
                    </div>
                    <span class="rating-hint" id="ratingHint">Valora este gimnasio</span>
                </div>
            </div>
            <div class="info-field">
                <span class="info-label">Descripción:</span>
                <div class="info-value info-value--desc" id="profileDesc">—</div>
            </div>
            <div class="info-field">
                <span class="info-label">Información de contacto:</span>
                <div class="contact-lines" id="contactLines">—</div>
            </div>
            <div id="ownerControls" style="display:none; margin-top:10px;">
                <button class="edit-mode-btn" id="editBtn">✏️ Editar Gimnasio</button>
            </div>
        </div>
    </section>

    <div id="createActivityWrapper" style="display:none; text-align: center; margin: 20px 0;">
        <button id="openModalBtn" class="edit-mode-btn" style="background: #27ae60;">+ Create New Activity</button>
    </div>

    <div id="activityModal" class="modal-overlay">
        <div class="modal-content">
            <h2>New Activity</h2>
            <div class="modal-form">
                <label>Name:</label>
                <input type="text" id="actName" placeholder="Yoga, Boxing...">
                <label>Schedule (Time):</label>
                <input type="text" id="actSchedule" placeholder="18:00 - 19:30">
                <label>Date:</label>
                <input type="date" id="actDate">
                <label>Price (€):</label>
                <input type="number" id="actPrice" placeholder="0">
                <label>Slots:</label>
                <input type="number" id="actSlots" placeholder="15">

                <div style="display:flex; gap:10px; margin-top:15px;">
                    <button id="saveActivityBtn" class="edit-mode-btn" style="background: #27ae60; flex:1;">Create</button>
                    <button id="closeModalBtn" class="edit-mode-btn" style="background: #e74c3c; flex:1;">Cancel</button>
                </div>
            </div>
        </div>
    </div>

    <section class="gallery-section">
        <div class="gallery-carousel-wrapper">
            <button class="carousel-arrow carousel-arrow--left" id="carouselLeft">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M15 18l-6-6 6-6"/></svg>
            </button>
            <div class="gallery-carousel" id="galleryCarousel">
                <div class="gallery-slot"><svg class="slot-x" viewBox="0 0 120 120"><line x1="0" y1="0" x2="120" y2="120" stroke="#ccc" stroke-width="1"/><line x1="120" y1="0" x2="0" y2="120" stroke="#ccc" stroke-width="1"/></svg><span class="slot-caption">Gym Photo</span></div>
                <div class="gallery-slot"><svg class="slot-x" viewBox="0 0 120 120"><line x1="0" y1="0" x2="120" y2="120" stroke="#ccc" stroke-width="1"/><line x1="120" y1="0" x2="0" y2="120" stroke="#ccc" stroke-width="1"/></svg><span class="slot-caption">Gym Photo</span></div>
                <div class="gallery-slot"><svg class="slot-x" viewBox="0 0 120 120"><line x1="0" y1="0" x2="120" y2="120" stroke="#ccc" stroke-width="1"/><line x1="120" y1="0" x2="0" y2="120" stroke="#ccc" stroke-width="1"/></svg><span class="slot-caption">Gym Photo</span></div>
                <div class="gallery-slot"><svg class="slot-x" viewBox="0 0 120 120"><line x1="0" y1="0" x2="120" y2="120" stroke="#ccc" stroke-width="1"/><line x1="120" y1="0" x2="0" y2="120" stroke="#ccc" stroke-width="1"/></svg><span class="slot-caption">Gym Photo</span></div>
            </div>
            <button class="carousel-arrow carousel-arrow--right" id="carouselRight">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M9 18l6-6-6-6"/></svg>
            </button>
        </div>
    </section>

    <section class="date-filter-section">
        <div class="date-btn-group">
            <button class="date-btn" id="dateFromBtn">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
                <span id="dateFromLabel">Fecha desde</span>
            </button>
            <input type="date" id="dateFromInput" class="date-input-hidden">
            <button class="date-btn" id="dateToBtn">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
                <span id="dateToLabel">Fecha hasta</span>
            </button>
            <input type="date" id="dateToInput" class="date-input-hidden">
        </div>
    </section>

    <section class="activities-section" id="activitiesSection">
        <div class="activities-section-message">
            <p style="font-size:0.85rem;color:#999;">Cargando actividades...</p>
        </div>
    </section>

    <!-- ── Sección comentarios ── -->
    <section class="comments-section">
        <button class="comments-toggle-btn" id="commentsToggleBtn">
            💬 Ver comentarios
        </button>
        <div class="comments-box" id="commentsBox" style="display:none;">
            <div class="comment-form" id="commentForm" style="display:none;">
                <textarea class="comment-input" id="commentInput" placeholder="Escribe tu comentario..." rows="2"></textarea>
                <button class="comment-submit-btn" id="commentSubmitBtn">Publicar</button>
            </div>
            <div class="comment-list" id="commentList">
                <p class="no-comments">Cargando comentarios...</p>
            </div>
        </div>
    </section>

</main>

<footer xlu-include-file="components/Footer.html"></footer>

<script src="../javascript/scripts/xlu-include-file.js"></script>
<script>xLuIncludeFile();</script>
<script type="module" src="../javascript/app/header.js"></script>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-app.js";
    import { getFirestore, collection, getDocs, query, where, doc, addDoc, updateDoc, getDoc, serverTimestamp }
        from "https://www.gstatic.com/firebasejs/11.6.0/firebase-firestore.js";

    const userId = sessionStorage.getItem("userId");
    const role = sessionStorage.getItem("userRole");
    const params = new URLSearchParams(window.location.search);
    const ownerId = params.get("id") || sessionStorage.getItem("ownerId");
    const ownerType = "gym";

    if (!userId) window.location.href = "Login.html";
    if (role === "professional" && !params.get("id")) window.location.href = "ProfessionalPage.html";

    const response = await fetch("../assets/firebaseConfig.json");
    const firebaseConfig = await response.json();
    const app = initializeApp(firebaseConfig);
    const db  = getFirestore(app);

    const isOwner = (userId === ownerId);

    const nameEl = document.getElementById("profileName");
    const descEl = document.getElementById("profileDesc");
    const contactEl = document.getElementById("contactLines");
    const daysEl = document.getElementById("scheduleDays");
    const hoursEl = document.getElementById("scheduleHours");

    // ── Cargar datos del perfil ───────────────────────────
    if (ownerId) {
        const gymSnap = await getDoc(doc(db, "gyms", ownerId));
        if (gymSnap.exists()) {
            const data = gymSnap.data();
            nameEl.textContent = data.name || "—";
            descEl.textContent = data.description || "—";
            if (data.schedule) {
                daysEl.textContent = data.schedule.days || data.schedule || "—";
                hoursEl.textContent = (data.schedule.from && data.schedule.to) ? `${data.schedule.from}–${data.schedule.to}` : "";
            }
            contactEl.textContent = data.contactInfo || "—";

            if (isOwner) {
                document.getElementById("ownerControls").style.display = "block";
                document.getElementById("createActivityWrapper").style.display = "block";
            }
        }
    }

    // ── Lógica de Edición de Perfil ────────────────────────
    if (isOwner) {
        const editBtn = document.getElementById("editBtn");
        const saveBtn = document.getElementById("saveBtn");
        const fields = [nameEl, descEl, contactEl, daysEl, hoursEl];

        editBtn.addEventListener("click", () => {
            const isEditing = nameEl.contentEditable === "true";
            fields.forEach(el => {
                el.contentEditable = !isEditing;
                el.classList.toggle("editing", !isEditing);
            });
            editBtn.textContent = isEditing ? "Edit Gym" : "Cancel";
            saveBtn.style.display = isEditing ? "none" : "inline-block";
        });

        saveBtn.addEventListener("click", async () => {
            saveBtn.disabled = true;
            try {
                await updateDoc(doc(db, "gyms", ownerId), {
                    name: nameEl.textContent,
                    description: descEl.textContent,
                    contactInfo: contactEl.textContent,
                    schedule: {
                        days: daysEl.textContent,
                        from: hoursEl.textContent.split('–')[0] || "",
                        to: hoursEl.textContent.split('–')[1] || ""
                    }
                });
                alert("Gym Profile updated!");
                location.reload();
            } catch (e) {
                alert("Error saving changes.");
                saveBtn.disabled = false;
            }
        });

        // ── Lógica Modal Crear Actividad ──
        const modal = document.getElementById("activityModal");
        const openModalBtn = document.getElementById("openModalBtn");
        const closeModalBtn = document.getElementById("closeModalBtn");
        const saveActivityBtn = document.getElementById("saveActivityBtn");

    document.getElementById("commentSubmitBtn").addEventListener("click", async () => {
        const input = document.getElementById("commentInput");
        const text  = input.value.trim();
        if (!text) return;

        const btn = document.getElementById("commentSubmitBtn");
        btn.disabled = true; btn.textContent = "Publicando...";

        try {
            // Obtener nombre del usuario
            const userSnap = await getDoc(doc(db, "users", userId));
            const username = userSnap.exists()
                ? (userSnap.data().username || userSnap.data().name || "Usuario")
                : "Usuario";

            await addDoc(collection(db, "comments"), {
                targetId:   ownerId,
                targetType: "gym",
                userId,
                username,
                text,
                createdAt: serverTimestamp()
            });

            input.value = "";
            commentsLoaded = false;
            await loadComments();
            commentsLoaded = true;
        } catch (e) {
            console.error(e);
            alert("Error al publicar el comentario.");
        }
        btn.disabled = false; btn.textContent = "Publicar";
    });

    // ── Actividades ───────────────────────────────────────
    let allActivities = [];
    let myActivityIds = new Set();

    async function loadActivities(fromDate = null, toDate = null) {
        const container = document.getElementById("activitiesSection");
        container.innerHTML = `<p style="font-size:0.85rem;color:#999;">Cargando actividades...</p>`;
        try {
            const snap = await getDocs(query(
                collection(db, "activities"), where("ownerId", "==", ownerId)));
            allActivities = [];
            snap.forEach(d => allActivities.push({ id: d.id, ...d.data() }));

            const mySnap = await getDocs(query(
                collection(db, "reservations"),
                where("userId", "==", userId),
                where("status", "==", "active")));
            myActivityIds = new Set();
            mySnap.forEach(d => myActivityIds.add(d.data().activityId));

            let filtered = allActivities;
            if (fromDate || toDate) {
                filtered = allActivities.filter(a => {
                    if (!a.date) return true;
                    const actDate = new Date(a.date);
                    if (fromDate && actDate < new Date(fromDate)) return false;
                    if (toDate   && actDate > new Date(toDate))   return false;
                    return true;
                });
            }
            renderActivities(filtered);
        } catch (e) {
            console.error(e);
            container.innerHTML = `<p style="color:red;">Error al cargar actividades.</p>`;
        }
    }

    function renderActivities(activities) {
        const container = document.getElementById("activitiesSection");
        if (activities.length === 0) {
            container.innerHTML = `<p style="font-size:0.85rem;color:#999;">No hay actividades.</p>`;
            return;
        }
        container.innerHTML = activities.map(a => {
            const alreadySignedUp = myActivityIds.has(a.id);
            const noSlots = (a.availableSlots ?? a.slots ?? 0) <= 0;
            return `
            <div class="activity-card">
                <div class="activity-info">
                    <div class="activity-row"><span class="activity-field-label">Nombre:</span> <span class="activity-value">${a.name}</span></div>
                    <div class="activity-row"><span class="activity-field-label">Horario:</span> <span class="activity-value">${a.schedule || "—"}</span></div>
                    <div class="activity-row"><span class="activity-field-label">Fecha:</span> <span class="activity-value">${a.date || "—"}</span></div>
                </div>
                <div class="activity-right">
                    <div class="activity-row"><span class="activity-field-label">Precio:</span> <span class="activity-value">${a.price}€</span></div>
                    <div class="activity-row"><span class="activity-field-label">Cupo:</span> <span class="activity-value">${a.availableSlots ?? a.slots ?? 0}</span></div>
                </div>
                ${isOwner
                ? `<span class="activity-owner-badge">Tu actividad</span>`
                : `<button class="signup-btn ${alreadySignedUp ? 'signup-btn--done' : ''} ${noSlots && !alreadySignedUp ? 'signup-btn--full' : ''}"
                            data-id="${a.id}" data-name="${a.name}" data-date="${a.date || ''}"
                            data-schedule="${a.schedule || ''}" data-price="${a.price || 0}"
                            ${alreadySignedUp || noSlots ? 'disabled' : ''}>
                            ${alreadySignedUp ? '✓ Apuntado' : noSlots ? 'Completo' : 'Apuntarme'}
                           </button>`
            }
            </div>`;
        }).join("");

        if (!isOwner) {
            container.querySelectorAll(".signup-btn:not([disabled])").forEach(btn => {
                btn.onclick = async () => {
                    const actId = btn.dataset.id;
                    btn.disabled = true;
                    btn.textContent = "Comprobando...";
                    try {
                        const actRef  = doc(db, "activities", actId);
                        const actSnap = await getDoc(actRef);
                        if (!actSnap.exists()) { alert("Actividad no encontrada."); btn.disabled = false; return; }
                        const cur = actSnap.data().availableSlots ?? actSnap.data().slots ?? 0;
                        if (cur <= 0) { btn.textContent = "Completo"; btn.classList.add("signup-btn--full"); return; }

                        const existSnap = await getDocs(query(
                            collection(db, "reservations"),
                            where("userId", "==", userId),
                            where("activityId", "==", actId),
                            where("status", "==", "active")
                        ));
                        if (!existSnap.empty) { btn.textContent = "✓ Apuntado"; btn.classList.add("signup-btn--done"); return; }

                        await addDoc(collection(db, "reservations"), {
                            userId, activityId: actId, gymOrProId: ownerId,
                            ownerType: "gym", status: "active",
                            paid: false, createdAt: serverTimestamp()
                        });
                        await updateDoc(actRef, { availableSlots: cur - 1 });

                        const gymSnap2 = await getDoc(doc(db, "gyms", ownerId));
                        const gymName  = gymSnap2.exists() ? gymSnap2.data().name : "Gimnasio";
                        const userEmail = sessionStorage.getItem("userEmail") || "";
                        try {
                            await emailjs.send("service_ak2mcnm", "template_czzg7qg", {
                                type: "confirmada ✅",
                                user_name: userEmail.split("@")[0] || "Cliente",
                                user_email: userEmail,
                                activity_name: btn.dataset.name,
                                activity_date: btn.dataset.date,
                                activity_schedule: btn.dataset.schedule,
                                activity_price: btn.dataset.price,
                                owner_name: gymName,
                                comment: "¡Te esperamos!"
                            });
                        } catch (emailErr) { console.warn("Email no enviado:", emailErr); }

                        alert("Reserva confirmada. Échale un vistazo a tu correo.");
                        btn.textContent = "✓ Apuntado";
                        btn.classList.add("signup-btn--done");
                        myActivityIds.add(actId);
                    } catch (e) {
                        console.error(e);
                        alert("Error al realizar la reserva.");
                        btn.disabled = false;
                        btn.textContent = "Apuntarme";
                    }
                };
            });
        }
    }

    document.getElementById("dateFromBtn").onclick = () =>
        document.getElementById("dateFromInput").showPicker?.() || document.getElementById("dateFromInput").click();
    document.getElementById("dateToBtn").onclick = () =>
        document.getElementById("dateToInput").showPicker?.() || document.getElementById("dateToInput").click();

    document.getElementById("dateFromInput").onchange = function () {
        const toVal = document.getElementById("dateToInput").value;
        if (toVal && this.value > toVal) {
            alert("La fecha desde no puede ser mayor que la fecha hasta.");
            this.value = "";
            document.getElementById("dateFromLabel").textContent = "Fecha desde";
            return;
        }
        const [y, m, d] = this.value.split("-");
        if (this.value) document.getElementById("dateFromLabel").textContent = `${d}/${m}/${y}`;
        loadActivities(this.value, toVal);
    };

    document.getElementById("dateToInput").onchange = function () {
        const fromVal = document.getElementById("dateFromInput").value;
        if (fromVal && this.value < fromVal) {
            alert("La fecha hasta no puede ser menor que la fecha desde.");
            this.value = "";
            document.getElementById("dateToLabel").textContent = "Fecha hasta";
            return;
        }
        const [y, m, d] = this.value.split("-");
        if (this.value) document.getElementById("dateToLabel").textContent = `${d}/${m}/${y}`;
        loadActivities(fromVal, this.value);
    };

    document.getElementById("carouselLeft").onclick  = () =>
        document.getElementById("galleryCarousel").scrollBy({ left: -140, behavior: "smooth" });
    document.getElementById("carouselRight").onclick = () =>
        document.getElementById("galleryCarousel").scrollBy({ left: 140, behavior: "smooth" });

    loadData();
</script>
</body>
</html>
