<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="../css/GymPage.css">
    <link rel="stylesheet" href="../css/components/Header.css">
    <link rel="stylesheet" href="../css/components/Footer.css">
</head>
<body class="page--gym">

<header xlu-include-file="components/Header.html"></header>

<main class="profile-page-main">

    <button class="back-btn" onclick="history.back()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
            <path d="M19 12H5M12 5l-7 7 7 7"/>
        </svg>
    </button>

    <section class="top-section">
        <div class="profile-photo-block">
            <div class="profile-photo">
                <svg class="photo-x" viewBox="0 0 200 160" xmlns="http://www.w3.org/2000/svg">
                    <line x1="0" y1="0" x2="200" y2="160" stroke="#ccc" stroke-width="1.2"/>
                    <line x1="200" y1="0" x2="0" y2="160" stroke="#ccc" stroke-width="1.2"/>
                </svg>
                <span class="photo-caption">Gym Profile</span>
            </div>
            <div class="schedule-block">
                <span class="schedule-label">Schedule:</span>
                <div class="schedule-box">
                    <span class="schedule-days" id="scheduleDays">—</span>
                    <span class="schedule-hours" id="scheduleHours">—</span>
                </div>
            </div>
        </div>

        <div class="info-block">
            <div class="info-row info-row--top">
                <div class="info-field">
                    <span class="info-label">Gym name:</span>
                    <div class="info-value info-value--name" id="profileName">—</div>
                </div>
                <div class="rating-block">
                    <span class="info-label">Average score:</span>
                    <div class="stars" id="starsContainer">
                        <span class="star" data-value="1">★</span>
                        <span class="star" data-value="2">★</span>
                        <span class="star" data-value="3">★</span>
                        <span class="star" data-value="4">★</span>
                        <span class="star" data-value="5">★</span>
                    </div>
                    <span class="rating-hint" id="ratingHint">Valora este gimnasio</span>
                </div>
            </div>
            <div class="info-field">
                <span class="info-label">Gym description:</span>
                <div class="info-value info-value--desc" id="profileDesc">—</div>
            </div>
            <div class="info-field">
                <span class="info-label">Contact info:</span>
                <div class="contact-lines" id="contactLines">—</div>
            </div>
        </div>
    </section>

    <section class="gallery-section">
        <div class="gallery-carousel-wrapper">
            <button class="carousel-arrow carousel-arrow--left" id="carouselLeft">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M15 18l-6-6 6-6"/></svg>
            </button>
            <div class="gallery-carousel" id="galleryCarousel">
                <div class="gallery-slot"><svg class="slot-x" viewBox="0 0 120 120"><line x1="0" y1="0" x2="120" y2="120" stroke="#ccc" stroke-width="1"/><line x1="120" y1="0" x2="0" y2="120" stroke="#ccc" stroke-width="1"/></svg><span class="slot-caption">Gym Photo</span></div>
                <div class="gallery-slot"><svg class="slot-x" viewBox="0 0 120 120"><line x1="0" y1="0" x2="120" y2="120" stroke="#ccc" stroke-width="1"/><line x1="120" y1="0" x2="0" y2="120" stroke="#ccc" stroke-width="1"/></svg><span class="slot-caption">Gym Photo</span></div>
                <div class="gallery-slot"><svg class="slot-x" viewBox="0 0 120 120"><line x1="0" y1="0" x2="120" y2="120" stroke="#ccc" stroke-width="1"/><line x1="120" y1="0" x2="0" y2="120" stroke="#ccc" stroke-width="1"/></svg><span class="slot-caption">Gym Photo</span></div>
                <div class="gallery-slot"><svg class="slot-x" viewBox="0 0 120 120"><line x1="0" y1="0" x2="120" y2="120" stroke="#ccc" stroke-width="1"/><line x1="120" y1="0" x2="0" y2="120" stroke="#ccc" stroke-width="1"/></svg><span class="slot-caption">Gym Photo</span></div>
            </div>
            <button class="carousel-arrow carousel-arrow--right" id="carouselRight">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M9 18l6-6-6-6"/></svg>
            </button>
        </div>
    </section>

    <section class="date-filter-section">
        <div class="date-btn-group">
            <button class="date-btn" id="dateFromBtn">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
                <span id="dateFromLabel">Date from</span>
            </button>
            <input type="date" id="dateFromInput" class="date-input-hidden">
            <button class="date-btn" id="dateToBtn">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
                <span id="dateToLabel">Date to</span>
            </button>
            <input type="date" id="dateToInput" class="date-input-hidden">
        </div>
    </section>

    <section class="activities-section" id="activitiesSection">
        <p style="font-size:0.85rem;color:#999;">Cargando actividades...</p>
    </section>

</main>

        <a href="AboutUs.html">About Us</a>

    <div class="footer-logo"><strong>Logo</strong></div>
    <div class="footer-contact">
        <a href="mailto:cathaysa.moreno101@alu.ulpgc.es?subject=Consulta sobre la web&body=Hola, me gustaría saber más sobre...">Link Email</a>
        <a href="https://wa.me/+34628193554?text=Hola!%20Vengo%20de%20tu%20web%20y%20tengo%20una%20duda%20sobre...">Link Phone</a>
        <div class="team-link"><a href="OurTeam.html">Our Team</a></div>
    </div>
</footer>

<script src="../javascript/scripts/xlu-include-file.js"></script>
<script>
    xLuIncludeFile();
</script>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-app.js";
    import { getFirestore, collection, getDocs, query, where, doc, addDoc, updateDoc, getDoc, serverTimestamp }
        from "https://www.gstatic.com/firebasejs/11.6.0/firebase-firestore.js";

    const userId    = sessionStorage.getItem("userId");
    const role      = sessionStorage.getItem("userRole");
    const params    = new URLSearchParams(window.location.search);
    const ownerId   = params.get("id");
    const ownerType = "gym";

    if (!userId) window.location.href = "Login.html";
    if (role === "professional") window.location.href = "ProfessionalPage.html";

    const response = await fetch("../assets/firebaseConfig.json");
    const firebaseConfig = await response.json();
    const app = initializeApp(firebaseConfig);
    const db  = getFirestore(app);

    const isOwner = role === ownerType;

    // ── Cargar datos del gym ──────────────────────────────
    if (ownerId) {
        const gymSnap = await getDoc(doc(db, "gyms", ownerId));
        if (gymSnap.exists()) {
            const data = gymSnap.data();
            document.getElementById("profileName").textContent = data.name || "—";
            document.getElementById("profileDesc").textContent = data.description || "—";
            if (data.schedule) {
                document.getElementById("scheduleDays").textContent  = data.schedule.days  || data.schedule;
                document.getElementById("scheduleHours").textContent = data.schedule.from && data.schedule.to
                    ? `${data.schedule.from}–${data.schedule.to}` : "";
            }
            if (data.contactInfo) {
                document.getElementById("contactLines").innerHTML =
                    `<span class="contact-item">${data.contactInfo}</span>`;
            }
            if (data.rating) {
                const rounded = Math.round(data.rating);
                document.querySelectorAll(".star").forEach(s => {
                    if (+s.dataset.value <= rounded) s.classList.add("star--active");
                });
                document.getElementById("ratingHint").textContent = `${data.rating.toFixed(1)} / 5`;
            }
        }
    }

    // ── Actividades ───────────────────────────────────────
    const activitiesSection = document.getElementById("activitiesSection");
    let allActivities = [];
    let myActivityIds = new Set(); // IDs de actividades en las que ya estoy apuntado

    async function loadActivities(fromDate = null, toDate = null) {
        activitiesSection.innerHTML = `<p style="font-size:0.85rem;color:#999;padding:10px 0;">Cargando actividades...</p>`;
        try {
            // Cargar actividades del gym
            const snap = await getDocs(query(
                collection(db, "activities"),
                where("ownerId", "==", ownerId)
            ));
            allActivities = [];
            snap.forEach(d => allActivities.push({ id: d.id, ...d.data() }));

            // Cargar reservas activas del usuario para marcar botones
            const myReservationsSnap = await getDocs(query(
                collection(db, "reservations"),
                where("userId", "==", userId),
                where("status", "==", "active")
            ));
            myActivityIds = new Set();
            myReservationsSnap.forEach(d => myActivityIds.add(d.data().activityId));

            let filtered = allActivities;
            if (fromDate || toDate) {
                filtered = allActivities.filter(a => {
                    if (!a.date) return true;
                    const actDate = new Date(a.date);
                    if (fromDate && actDate < new Date(fromDate)) return false;
                    if (toDate   && actDate > new Date(toDate))   return false;
                    return true;
                });
            }
            renderActivities(filtered);
        } catch (e) {
            console.error(e);
            activitiesSection.innerHTML = `<p style="font-size:0.85rem;color:#c0392b;">Error al cargar actividades.</p>`;
        }
    }

    function renderActivities(activities) {
        if (activities.length === 0) {
            activitiesSection.innerHTML = `<p style="font-size:0.85rem;color:#999;padding:10px 0;">No hay actividades disponibles.</p>`;
            return;
        }
        activitiesSection.innerHTML = activities.map((a, i) => {
            const alreadySignedUp = myActivityIds.has(a.id);
            return `
            <div class="activity-card">
                <div class="activity-info">
                    <div class="activity-row">
                        <span class="activity-field-label">Activity name:</span>
                        <span class="activity-value">${a.name || "—"}</span>
                    </div>
                    <div class="activity-row">
                        <span class="activity-field-label">Activity schedule:</span>
                        <span class="activity-value">${a.schedule || "—"}</span>
                    </div>
                    ${a.date ? `<div class="activity-row">
                        <span class="activity-field-label">Date:</span>
                        <span class="activity-value">${a.date}</span>
                    </div>` : ""}
                </div>
                <div class="activity-right">
                    <div class="activity-row">
                        <span class="activity-field-label">Price:</span>
                        <span class="activity-value activity-value--price">${a.price ? a.price + "€" : "Gratis"}</span>
                    </div>
                    <div class="activity-row">
                        <span class="activity-field-label">Available slots:</span>
                        <span class="activity-value">${a.availableSlots ?? a.slots ?? "—"}</span>
                    </div>
                </div>
                ${isOwner
                ? `<span class="activity-owner-badge">Tu actividad</span>`
                : `<button class="signup-btn ${alreadySignedUp ? 'signup-btn--done' : ''}"
                        data-activity-id="${a.id}"
                        ${alreadySignedUp ? 'disabled' : ''}>
                        ${alreadySignedUp ? '✓ Ya apuntado' : 'Sign up'}
                       </button>`
            }
            </div>`;
        }).join("");

        if (!isOwner) {
            activitiesSection.querySelectorAll(".signup-btn:not([disabled])").forEach(btn => {
                btn.addEventListener("click", async () => {
                    if (btn.classList.contains("signup-btn--done")) return;
                    btn.textContent = "Comprobando...";
                    btn.disabled = true;
                    try {
                        // Doble comprobación en Firestore por si acaso
                        const existingSnap = await getDocs(query(
                            collection(db, "reservations"),
                            where("userId", "==", userId),
                            where("activityId", "==", btn.dataset.activityId),
                            where("status", "==", "active")
                        ));
                        if (!existingSnap.empty) {
                            btn.textContent = "✓ Ya apuntado";
                            btn.classList.add("signup-btn--done");
                            myActivityIds.add(btn.dataset.activityId);
                            return;
                        }

                        btn.textContent = "Guardando...";
                        await addDoc(collection(db, "reservations"), {
                            userId,
                            activityId: btn.dataset.activityId,
                            gymOrProId: ownerId,
                            ownerType,
                            status: "active",
                            paid: false,
                            createdAt: serverTimestamp()
                        });

                        const actRef  = doc(db, "activities", btn.dataset.activityId);
                        const actSnap = await getDoc(actRef);
                        if (actSnap.exists()) {
                            const slots = actSnap.data().availableSlots ?? actSnap.data().slots ?? 0;
                            if (slots > 0) await updateDoc(actRef, { availableSlots: slots - 1 });
                        }

                        btn.textContent = "✓ Apuntado";
                        btn.classList.add("signup-btn--done");
                        myActivityIds.add(btn.dataset.activityId);

                    } catch (e) {
                        console.error(e);
                        btn.textContent = "Error";
                        btn.disabled = false;
                    }
                });
            });
        }
    }

    // ── Filtro fechas ─────────────────────────────────────
    document.getElementById("dateFromBtn").addEventListener("click", () =>
        document.getElementById("dateFromInput").showPicker?.() ||
        document.getElementById("dateFromInput").click());
    document.getElementById("dateToBtn").addEventListener("click", () =>
        document.getElementById("dateToInput").showPicker?.() ||
        document.getElementById("dateToInput").click());

    document.getElementById("dateFromInput").addEventListener("change", function () {
        const [y, m, d] = this.value.split("-");
        document.getElementById("dateFromLabel").textContent = this.value ? `${d}/${m}/${y}` : "Date from";
        document.getElementById("dateFromBtn").classList.toggle("date-btn--active", !!this.value);
        loadActivities(this.value || null, document.getElementById("dateToInput").value || null);
    });
    document.getElementById("dateToInput").addEventListener("change", function () {
        const [y, m, d] = this.value.split("-");
        document.getElementById("dateToLabel").textContent = this.value ? `${d}/${m}/${y}` : "Date to";
        document.getElementById("dateToBtn").classList.toggle("date-btn--active", !!this.value);
        loadActivities(document.getElementById("dateFromInput").value || null, this.value || null);
    });

    // ── Stars ─────────────────────────────────────────────
    const starsContainer = document.getElementById("starsContainer");
    const stars          = starsContainer.querySelectorAll(".star");
    const ratingHint     = document.getElementById("ratingHint");
    let currentRating    = 0;

    if (isOwner) {
        starsContainer.style.pointerEvents = "none";
        ratingHint.textContent = "Tu perfil";
    } else {
        stars.forEach(star => {
            star.addEventListener("mouseover", () => highlightStars(+star.dataset.value));
            star.addEventListener("mouseout",  () => highlightStars(currentRating));
            star.addEventListener("click", async () => {
                currentRating = +star.dataset.value;
                highlightStars(currentRating);
                ratingHint.textContent = ["","Muy malo","Malo","Regular","Bueno","Excelente"][currentRating];
                ratingHint.style.color = "var(--accent)";
                if (ownerId) {
                    const targetRef  = doc(db, "gyms", ownerId);
                    const targetSnap = await getDoc(targetRef);
                    if (targetSnap.exists()) {
                        const { rating = 0, ratingCount = 0 } = targetSnap.data();
                        await updateDoc(targetRef, {
                            rating: ((rating * ratingCount) + currentRating) / (ratingCount + 1),
                            ratingCount: ratingCount + 1
                        });
                    }
                }
            });
        });
    }

    function highlightStars(n) {
        stars.forEach(s => s.classList.toggle("star--active", +s.dataset.value <= n));
    }

    // ── Carousel ──────────────────────────────────────────
    document.getElementById("carouselLeft").addEventListener("click", () =>
        document.getElementById("galleryCarousel").scrollBy({ left: -140, behavior: "smooth" }));
    document.getElementById("carouselRight").addEventListener("click", () =>
        document.getElementById("galleryCarousel").scrollBy({ left: 140, behavior: "smooth" }));

    // ── Arrancar ──────────────────────────────────────────
    if (ownerId) {
        loadActivities();
    } else {
        activitiesSection.innerHTML = `<p style="font-size:0.85rem;color:#999;">No se encontró el perfil.</p>`;
    }
</script>
</body>
</html>
