<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Login</title>
    <link rel="stylesheet" href="../css/Login.css">
</head>
<body>

<main class="login-container">

    <h1 class="tagline">
        From the screen to the court in a flash
    </h1>

    <form class="login-form">
        <input
                type="email"
                placeholder="Email"
                required
        >

        <input
                type="password"
                placeholder="Password"
                required
        >

        <button type="submit" class="btn primary">
            Login
        </button>

        <button type="button" class="btn secondary">
            Create an Account
        </button>
    </form>

</main>

</body>
</html>
