<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="../css/Login.css">
    <link rel="stylesheet" href="../css/components/Header.css">
    <link rel="stylesheet" href="../css/components/Footer.css">
</head>
<body>
<header xlu-include-file="components/Header.html"></header>

<main class="container">

    <section class="left">
        <h2>Login</h2>
        <div id="loginError" class="login-error" style="display:none;"></div>
        <div class="form">
            <label for="user">Email:</label>
            <input id="user" type="email" placeholder="example@mail.com">

            <label for="password">Password:</label>
            <input id="password" type="password" placeholder="********">

            <button class="btn btn-login" id="loginBtn">Login</button>

            <div class="links">
                <a href="ForgotYourPassword.html">Forgot your password?</a>
                <a href="RegisterAs.html">Register</a>
            </div>
        </div>
    </section>

    <section class="right">
        <div class="photo-box">
            <img src="../assets/imagenes/sporty_login_register.png" alt="">
        </div>
    </section>

</main>

<!-- ===== POPUP SELECTOR DE ROL ===== -->
<div class="role-overlay" id="roleOverlay">
    <div class="role-popup">
        <h2 class="role-title">Who are you?</h2>
        <div class="role-options">
            <button class="role-btn role-btn--gym" data-role="gym">Im a gym</button>
            <button class="role-btn role-btn--professional" data-role="professional">Im a professional</button>
            <button class="role-btn role-btn--user" data-role="user">Im a user</button>
        </div>
    </div>
</div>

<footer xlu-include-file="components/Footer.html"></footer>

<script src="../javascript/scripts/xlu-include-file.js"></script>
<script>
    xLuIncludeFile();
</script>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-auth.js";
    import { getFirestore, doc, getDoc, updateDoc } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-firestore.js";

    const response = await fetch("../assets/firebaseConfig.json");
    const firebaseConfig = await response.json();
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    let loggedUid = null;

    // ── Si viene del registro mostrar popup directamente ──
    const comingFromRegister = sessionStorage.getItem("showRolePopup");
    const alreadyLoggedId = sessionStorage.getItem("userId");

    if (comingFromRegister === "true" && alreadyLoggedId) {
        sessionStorage.removeItem("showRolePopup");
        loggedUid = alreadyLoggedId;
        document.getElementById("roleOverlay").classList.add("active");
    }

    // ── LOGIN ─────────────────────────────────────────────
    document.getElementById("loginBtn").addEventListener("click", async () => {
        const email = document.getElementById("user").value.trim();
        const password = document.getElementById("password").value;
        const errorEl = document.getElementById("loginError");
        errorEl.style.display = "none";

        if (!email || !password) {
            errorEl.textContent = "Por favor rellena todos los campos.";
            errorEl.style.display = "block";
            return;
        }

        try {
            const userCredential = await signInWithEmailAndPassword(auth, email, password);
            loggedUid = userCredential.user.uid;

            sessionStorage.setItem("userId", loggedUid);
            sessionStorage.setItem("userEmail", email);

            const userSnap = await getDoc(doc(db, "users", loggedUid));
            const userData = userSnap.exists() ? userSnap.data() : {};

            if (userData.role) {
                sessionStorage.setItem("userRole", userData.role);
                redirectByRole(userData.role);
            } else {
                document.getElementById("roleOverlay").classList.add("active");
            }

        } catch (e) {
            errorEl.style.display = "block";
            errorEl.textContent =
                e.code === "auth/invalid-credential"
                    ? "Email o contraseña incorrectos."
                    : "Error al iniciar sesión. Inténtalo de nuevo.";
        }
    });

    document.getElementById("password").addEventListener("keydown", e => {
        if (e.key === "Enter") document.getElementById("loginBtn").click();
    });

    // ── POPUP: elegir rol ─────────────────────────────────
    document.querySelectorAll(".role-btn").forEach(btn => {
        btn.addEventListener("click", async () => {
            const role = btn.dataset.role;
            await updateDoc(doc(db, "users", loggedUid), { role });
            sessionStorage.setItem("userRole", role);
            document.getElementById("roleOverlay").classList.remove("active");
            redirectByRole(role);
        });
    });

    // ── Redirigir según rol ───────────────────────────────
    function redirectByRole(role) {
        if (role === "gym")               window.location.href = "GymPage.html";
        else if (role === "professional") window.location.href = "ProfessionalPage.html";
        else                              window.location.href = "ActivitySearch.html";
    }
</script>
</body>
</html>
