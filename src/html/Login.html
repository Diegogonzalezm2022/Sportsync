<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="../css/Login.css">
    <link rel="stylesheet" href="../css/components/Header.css">
    <link rel="stylesheet" href="../css/components/Footer.css">
</head>
<body>
<header xlu-include-file="components/Header.html"></header>

<main class="container">
    <section class="left">
        <h2>Inicio de sesión</h2>
        <div id="loginError" class="login-error" style="display:none; color: red; margin-bottom: 10px;"></div>
        <div class="form">
            <label for="user">Email:</label>
            <input id="user" type="email" placeholder="ejemplo@mail.com">

            <label for="password">Contraseña:</label>
            <input id="password" type="password" placeholder="********">

            <button class="btn btn-login" id="loginBtn">Iniciar Sesión</button>

            <div class="links">
                <a href="ForgotYourPassword.html">¿Olvidaste tu contraseña?</a>
                <a href="CreateAnAccount.html">Registrarte</a>
            </div>
        </div>
    </section>

    <section class="right">
        <div class="photo-box">
            <img src="../assets/imagenes/sporty_login_register.png" alt="Sporty Logo">
        </div>
    </section>
</main>

<div class="role-overlay" id="roleOverlay">
    <div class="role-popup">
        <h2 class="role-title">¿Quién eres?</h2>
        <div class="role-options">
            <button class="role-btn role-btn--gym" data-role="gym">Soy un gimnasio</button>
            <button class="role-btn role-btn--professional" data-role="professional">Soy un profesional</button>
            <button class="role-btn role-btn--user" data-role="user">Soy un usuario</button>
        </div>
    </div>
</div>

<footer xlu-include-file="components/Footer.html"></footer>

<script src="../javascript/scripts/xlu-include-file.js"></script>
<script>
    if (typeof xLuIncludeFile === 'function') xLuIncludeFile();
</script>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-auth.js";
    import FirebaseDb from "../javascript/app/FirebaseDb.js";

    const response = await fetch("../assets/firebaseConfig.json");
    const firebaseConfig = await response.json();

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = await FirebaseDb.create()

    let loggedUid = null;

    function redirectByRole(role, ownId) {
        if (role === "gym")
            window.location.href = `GymPage.html?id=${ownId}`;
        else if (role === "professional")
            window.location.href = `ProfessionalPage.html?id=${ownId}`;
        else
            window.location.href = "ActivitySearch.html";
    }

    // ── Obtener ubicación como promesa ────────────────────
    function getLocationPromise() {
        return new Promise((resolve) => {
            if (!navigator.geolocation) { resolve(null); return; }
            navigator.geolocation.getCurrentPosition(
                pos => resolve({ lat: pos.coords.latitude, lng: pos.coords.longitude }),
                ()  => resolve(null),
                { enableHighAccuracy: true, timeout: 8000 }
            );
        });
    }

    // ── Login ─────────────────────────────────────────────
    document.getElementById("loginBtn").addEventListener("click", async () => {
        const email    = document.getElementById("user").value.trim();
        const password = document.getElementById("password").value;
        const errorEl  = document.getElementById("loginError");
        errorEl.style.display = "none";

        if (!email || !password) {
            errorEl.textContent = "Por favor rellena todos los campos.";
            errorEl.style.display = "block";
            return;
        }

        try {
            const userCredential = await signInWithEmailAndPassword(auth, email, password);
            loggedUid = userCredential.user.uid;

            sessionStorage.setItem("userId", loggedUid);
            sessionStorage.setItem("userEmail", email);

            const userData = await db.getUser(loggedUid);

            if (userData.role) {
                sessionStorage.setItem("userRole", userData.role);
                const oId = (userData.role === "gym" || userData.role === "professional") ? loggedUid : null;
                if (oId) sessionStorage.setItem("ownerId", oId);
                redirectByRole(userData.role, oId);
            } else {
                document.getElementById("roleOverlay").classList.add("active");
            }
        } catch (e) {
            console.error(e);
            document.getElementById("loginError").textContent = "Email o contraseña incorrectos.";
            document.getElementById("loginError").style.display = "block";
        }
    });

    document.getElementById("password").addEventListener("keydown", e => {
        if (e.key === "Enter") document.getElementById("loginBtn").click();
    });

    // ── Selección de rol ──────────────────────────────────
    document.querySelectorAll(".role-btn").forEach(btn => {
        btn.addEventListener("click", async () => {
            const role = btn.dataset.role;
            if (!loggedUid) return;

            // Deshabilitar botones mientras procesa
            document.querySelectorAll(".role-btn").forEach(b => b.disabled = true);

            try {
                await db.setUserRole(loggedUid, role);
                sessionStorage.setItem("userRole", role);

                if (role === "gym" || role === "professional") {
                    /*
                    const colName = role === "gym" ? "gyms" : "professionals";
                    */
                    const uData = db.getUser(loggedUid);
                    /* ¿Es importante que dueño de gimnasio y gimnasio tengan el mismo Id?
                    await setDoc(doc(db, colName, loggedUid), {
                    const colName  = role === "gym" ? "gyms" : "professionals";
                    const userSnap = await getDoc(doc(db, "users", loggedUid));
                    const uData    = userSnap.exists() ? userSnap.data() : {};

                    // Intentar obtener ubicación antes de crear el documento
                    const location = await getLocationPromise();

                    const docData = {
                        name: `${uData.name || ""} ${uData.surname || ""}`.trim(),
                        description: "",
                        contactInfo: "",
                        schedule: "",
                        type: role,
                        ownerId: loggedUid,
                        createdAt: serverTimestamp()
                    };

                    // Solo añadir location si se obtuvo correctamente
                    if (location) docData.location = location;

                    await setDoc(doc(db, colName, loggedUid), docData);
                    });
                    */
                    if (role === "gym") {
                        await db.addGym({
                            name: `${uData.name || ""} ${uData.surname || ""}`.trim(),
                            description: "",
                            contactInfo: "",
                            schedule: "",
                            ownerId: loggedUid,
                        }, loggedUid)
                    } else if (role === "professional") {
                        await db.addProfessional({
                            name: `${uData.name || ""} ${uData.surname || ""}`.trim(),
                            description: "",
                            contactInfo: "",
                            schedule: "",
                            ownerId: loggedUid,
                        }, loggedUid)
                    }

                    sessionStorage.setItem("ownerId", loggedUid);
                }

                document.getElementById("roleOverlay").classList.remove("active");
                redirectByRole(role, loggedUid);
            } catch (error) {
                console.error("Error al asignar rol:", error);
                document.querySelectorAll(".role-btn").forEach(b => b.disabled = false);
            }
        });
    });
</script>
<script type="module" src="../javascript/app/Header.js"></script>
</body>
</html>
