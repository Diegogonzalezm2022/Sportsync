<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="../css/Login.css">
    <link rel="stylesheet" href="../css/components/Header.css">
    <link rel="stylesheet" href="../css/components/Footer.css">
</head>
<body>
<header xlu-include-file="components/Header.html"></header>

<main class="container">

    <section class="left">
        <h2>Login</h2>
        <div id="loginError" class="login-error" style="display:none;"></div>
        <div class="form">
            <label for="user">Email:</label>
            <input id="user" type="email" placeholder="example@mail.com">

            <label for="password">Password:</label>
            <input id="password" type="password" placeholder="********">

            <button class="btn btn-login" id="loginBtn">Login</button>

            <div class="links">
                <a href="ForgotYourPassword.html">Forgot your password?</a>
                <a href="RegisterAs.html">Register</a>
            </div>
        </div>
    </section>

    <section class="right">
        <div class="photo-box">
            <img src="../assets/imagenes/sporty_login_register.png" alt="">
        </div>
    </section>

</main>

<footer xlu-include-file="components/Footer.html"></footer>

<script src="../javascript/scripts/xlu-include-file.js"></script>
<script>
    xLuIncludeFile();
</script>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-auth.js";

    const response = await fetch("../assets/firebaseConfig.json");
    const firebaseConfig = await response.json();
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    document.getElementById("loginBtn").addEventListener("click", async () => {
        const email = document.getElementById("user").value.trim();
        const password = document.getElementById("password").value;
        const errorEl = document.getElementById("loginError");

        if (!email || !password) {
            errorEl.textContent = "Por favor rellena todos los campos.";
            errorEl.style.display = "block";
            return;
        }

        try {
            const userCredential = await signInWithEmailAndPassword(auth, email, password);
            // Guardar uid en sessionStorage para usarlo en otras páginas
            sessionStorage.setItem("userId", userCredential.user.uid);
            sessionStorage.setItem("userEmail", userCredential.user.email);
            window.location.href = "ActivitySearch.html";
        } catch (e) {
            errorEl.style.display = "block";
            errorEl.textContent =
                e.code === "auth/invalid-credential"
                    ? "Email o contraseña incorrectos."
                    : "Error al iniciar sesión. Inténtalo de nuevo.";
        }
    });

    // Permitir login con Enter
    document.getElementById("password").addEventListener("keydown", e => {
        if (e.key === "Enter") document.getElementById("loginBtn").click();
    });
</script>
</body>
</html>
