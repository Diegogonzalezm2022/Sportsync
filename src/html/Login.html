<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Login</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../css/Login.css">
    <link rel="stylesheet" href="../css/components/Header.css">
    <link rel="stylesheet" href="../css/components/Footer.css">
    <script src="../javascript/scripts/xlu-include-file.js"></script>

</head>
<body>
<header xlu-include-file="components/Header.html"></header>
<main class="container">

    <!-- Lado izquierdo -->
    <section class="left">
        <h2>Login</h2>

        <form class="form">
            <label for="user">User:</label>
            <input id="user" type="text" placeholder="example">

            <label for="password">Password:</label>
            <input id="password" type="password" placeholder="********">

            <button class="btn btn-login" onclick="window.location.href='ActivitySearch.html'">Login</button>

            <div class="links">
                <a href="ForgotYourPassword.html">Forgot your password?</a>
                <a href="RegisterAs.html">Register</a>
            </div>
        </form>
    </section>

    <!-- Lado derecho -->
    <section class="right">
        <div class="photo-box">
            <img src="../assets/imagenes/sporty_login_register.png" alt="">
        </div>
    </section>

</main>
<footer xlu-include-file="components/Footer.html"></footer>
<script>
    xLuIncludeFile()
</script>
</body>
</html>
