<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ProfileUser</title>
    <link rel="stylesheet" href="../css/components/Header.css">
    <link rel="stylesheet" href="../css/components/Footer.css">
    <link rel="stylesheet" href="../css/ProfileUser.css">
</head>
<body>
<header xlu-include-file="components/Header.html"></header>

<main class="profile-container">

    <button class="back-btn" onclick="history.back()">&#8592;</button>

    <h2>Profile User</h2>

    <section id="profile-header">
        <div class="profile-photo-container">
            <div class="photo-placeholder">
                <!-- Foto de perfil o avatar SVG si no hay foto -->
                <img src="" id="profile-picture" style="display:none; width:100%; height:100%; object-fit:cover; border-radius:50%;">
                <svg id="profile-avatar-svg" viewBox="0 0 24 24" fill="none" stroke="#aaa" stroke-width="1.5">
                    <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                    <circle cx="12" cy="7" r="4"/>
                </svg>
            </div>
        </div>

        <div class="profile-info-grid">
            <div class="info-group">
                <p class="label">Name</p>
                <div class="data-box" id="profile-name">—</div>
            </div>
            <div class="info-group">
                <p class="label">User</p>
                <div class="data-box" id="profile-user">—</div>
            </div>
            <div class="info-group">
                <p class="label">Email</p>
                <div class="data-box" id="profile-email">—</div>
            </div>
            <div class="info-group" id="phone-group" style="display:none;">
                <p class="label">Phone</p>
                <div class="data-box" id="profile-phone">—</div>
            </div>
            <div class="info-group" id="payment-group" style="display:none;">
                <p class="label">Payment method</p>
                <div class="data-box" id="profile-payment">—</div>
            </div>
        </div>
    </section>

    <section class="profile-details">
        <div class="biography-section">
            <p class="label">Biography</p>
            <div class="bio-box" id="profile-bio">—</div>
        </div>
    </section>

    <h2 class="myreserv-title">My reservations</h2>
    <section id="shared-files">
        <div class="shared-item test-box">
            <button class="btn-reserv" onclick="window.location.href='History.html'">View History</button>
        </div>
    </section>

    <div class="btn-edit-profile">
        <button class="btn-edit" onclick="window.location.href='EditProfile.html'">Edit Profile</button>
    </div>

</main>

<footer xlu-include-file="components/Footer.html"></footer>

<script src="../javascript/scripts/xlu-include-file.js"></script>
<script src="../javascript/pages/ProfileUser.js"
<script>
    xLuIncludeFile();
</script>
</body>
</html>
