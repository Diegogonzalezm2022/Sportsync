server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html/frontend/html;
    index Index.html;

    # Serve all static files from root
    location / {
        try_files $uri $uri/ /Index.html;
    }

    # Serve assets correctly
    location /assets/ {
        alias /usr/share/nginx/html/assets/;
    }

    # Serve CSS
    location /css/ {
        alias /usr/share/nginx/html/frontend/css/;
    }

    # Serve JS
    location /javascript/ {
        alias /usr/share/nginx/html/frontend/javascript/;
    }

    # Serve FirebaseDb.js correctly (which is requested as ../../../backend/javascript/app/FirebaseDb.js from Login.js)
    location /backend/ {
        alias /usr/share/nginx/html/backend/;
    }

    # Proxy API requests to the backend container
    location /api/ {
        proxy_pass http://backend:3000/api/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }
}
