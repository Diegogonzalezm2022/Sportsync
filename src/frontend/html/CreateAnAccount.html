<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create An Account - SportSync</title>
    <link rel="stylesheet" href="../css/CreateAnAccount.css">
    <link rel="stylesheet" href="../css/components/Header.css">
    <link rel="stylesheet" href="../css/components/Footer.css">
</head>
<body>
<header xlu-include-file="components/Header.html"></header>

<main class="register-container">

    <section class="form-section">
        <h2>Crea una cuenta</h2>
        <div id="registerError" class="login-error" style="display:none;"></div>
        <div class="register-form">

            <label>Email</label>
            <input type="email" id="email" placeholder="ejemplo@gmail.com">

            <label>Nombre</label>
            <input type="text" id="name" placeholder="Pepe">

            <label>Apellido</label>
            <input type="text" id="surname" placeholder="Molina Hernández">

            <label>Nombre de usuario</label>
            <input type="text" id="username" placeholder="Pepito99">

            <label>Contraseña</label>
            <input type="password" id="password">

            <label>Repite contraseña</label>
            <input type="password" id="passwordRepeat">

            <button class="btn-register" id="registerBtn">Registrar</button>
        </div>
    </section>

    <section class="photo-section">
        <div class="photo-box">
            <img src="../assets/imagenes/sporty_login_register.png" alt="">
        </div>
    </section>

</main>

<footer xlu-include-file="components/Footer.html"></footer>

<script src="../javascript/scripts/xlu-include-file.js"></script>
<script>
    xLuIncludeFile();
</script>
<script type="module" src="../javascript/pages/CreateAnAccount.js"></script>
<script type="module" src="../javascript/scripts/Header.js"></script>
<script type="module" src="../../backend/javascript/app/FirebaseDb.js"></script>
</body>
</html>
