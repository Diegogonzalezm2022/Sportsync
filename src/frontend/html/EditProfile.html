<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Profile</title>
    <link rel="stylesheet" href="../css/EditProfile.css">
    <link rel="stylesheet" href="../css/components/Header.css">
    <link rel="stylesheet" href="../css/components/Footer.css">
</head>
<body>
<header xlu-include-file="components/Header.html"></header>

<main class="profile-main">

    <div class="profile-header">
        <button class="back-btn" onclick="history.back()">&#8592;</button>

        <!-- Foto de perfil clicable -->
        <div class="avatar-circle" id="avatarCircle" style="cursor:pointer; position:relative; overflow:hidden;">
            <img id="avatarPreview" src="" alt="Foto de perfil"
                 style="display:none; width:100%; height:100%; object-fit:cover; border-radius:50%; position:absolute; inset:0;">
            <svg id="avatarSvg" viewBox="0 0 24 24" width="40" height="40" stroke="currentColor" stroke-width="2" fill="none">
                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                <circle cx="12" cy="7" r="4"/>
            </svg>
            <span style="position:absolute;bottom:0;left:0;right:0;background:rgba(0,0,0,0.45);color:#fff;font-size:10px;text-align:center;padding:3px 0;">Cambiar</span>
        </div>
        <input type="file" id="photoInput" accept="image/*" hidden>
    </div>

    <div id="saveMsg" style="display:none; background:#d8f3dc; color:#2d6a4f; border-radius:8px; padding:10px 16px; font-size:0.85rem; margin-bottom:8px;">
        ✓ Cambios guardados correctamente
    </div>
    <div id="errorMsg" style="display:none; background:#fdecea; color:#c0392b; border-radius:8px; padding:10px 16px; font-size:0.85rem; margin-bottom:8px;"></div>

    <div class="profile-form">

        <div class="form-group">
            <label for="username">Usuario</label>
            <input type="text" id="username" name="username" placeholder="Ejemplo">
        </div>

        <div class="form-group">
            <label for="bio">Biografía</label>
            <textarea id="bio" name="bio" placeholder="Cuéntanos algo sobre ti..."
                      style="width:100%; padding:9px 12px; border:2px solid lightseagreen; border-radius:10px;
                font-family:inherit; font-size:0.88rem; resize:vertical; min-height:80px; outline:none;"></textarea>
        </div>

        <div class="form-group">
            <label for="email">Email</label>
            <span id="email" class="email-display"></span>
        </div>

        <div class="form-group">
            <label for="phone">Teléfono</label>
            <input type="tel" id="phone" name="phone" placeholder="+34 123 456 789">
        </div>

        <div class="form-group inline-group">
            <label for="payment-method">Método de pago:</label>
            <div class="select-wrapper">
                <select id="payment-method" name="payment-method">
                    <option value="" disabled selected>Selecciona</option>
                    <option value="card">Tarjeta de Crédito</option>
                    <option value="paypal">PayPal</option>
                    <option value="bizum">Bizum</option>
                    <option value="efectivo">Efectivo</option>
                </select>
            </div>
        </div>

        <div class="form-group">
            <input type="text" id="payment-details" name="payment-details" placeholder="Número de tarjeta o email de PayPal...">
        </div>

        <div class="form-actions">
            <button type="button" class="save-btn" id="saveBtn">Guardar Cambios</button>
        </div>

    </div>
</main>

<footer xlu-include-file="components/Footer.html"></footer>

<script type="module" src="../javascript/scripts/auth-guard.js"></script>
<script src="../javascript/scripts/xlu-include-file.js"></script>
<script type="module" src="../javascript/pages/EditProfile.js"></script>
<script>
    xLuIncludeFile();
</script>

</body>
</html>
