<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Activity Search</title>
    <link rel="stylesheet" href="css/ActivitySearch.css">
    <link rel="stylesheet" href="css/components/Header.css">
    <link rel="stylesheet" href="css/components/Footer.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script type="module" src="javascript/scripts/Header.js"></script>
    <script type="module" src="javascript/pages/ActivitySearch.js"></script>
    <style>
        .map-expand-btn {
            position: absolute; top: 8px; right: 8px; z-index: 1000;
            width: 32px; height: 32px; border-radius: 8px; border: none;
            background: white; box-shadow: 0 2px 6px rgba(0,0,0,0.2);
            cursor: pointer; display: flex; align-items: center;
            justify-content: center; color: #333; transition: background 0.2s;
        }
        .map-expand-btn:hover { background: #f0f0f0; }
        .map-expand-btn svg { width: 16px; height: 16px; }
        .map-container { position: relative; }
        .map-modal-overlay {
            display: none; position: fixed; inset: 0;
            background: rgba(0,0,0,0.6); z-index: 9999;
            align-items: center; justify-content: center; padding: 20px;
        }
        .map-modal-overlay.active { display: flex; }
        .map-modal-inner {
            width: 100%; max-width: 900px; height: 80vh;
            background: white; border-radius: 16px; overflow: hidden;
            position: relative; box-shadow: 0 8px 32px rgba(0,0,0,0.3);
        }
        #mapBig { width: 100%; height: 100%; }
        .map-modal-close {
            position: absolute; top: 12px; right: 12px; z-index: 10000;
            width: 36px; height: 36px; border-radius: 50%; border: none;
            background: white; box-shadow: 0 2px 8px rgba(0,0,0,0.2);
            cursor: pointer; display: flex; align-items: center;
            justify-content: center; font-size: 18px; color: #333;
        }
        .map-modal-close:hover { background: #f0f0f0; }
    </style>
</head>
<body>

<header xlu-include-file="components/Header.html"></header>

<main class="activity-search-main">

    <aside class="left-panel">

        <div class="user-card">
            <div class="user-avatar">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                    <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                    <circle cx="12" cy="7" r="4"/>
                </svg>
            </div>
            <div class="user-info">
                <span class="user-role" id="userRole">—</span>
                <span class="user-name" id="userName">—</span>
                <button class="go-to-profile-btn" onclick="window.location.href='ProfileUser.html'">Ir al perfil</button>
            </div>
        </div>

        <div class="map-container">
            <div id="map" style="width:100%; height:230px; border-radius:12px;"></div>
            <button class="map-expand-btn" id="mapExpandBtn" title="Ampliar mapa">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M8 3H5a2 2 0 0 0-2 2v3M21 8V5a2 2 0 0 0-2-2h-3M3 16v3a2 2 0 0 0 2 2h3M16 21h3a2 2 0 0 0 2-2v-3"/>
                </svg>
            </button>
            <button class="use-location-btn" id="useLocationBtn">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="12" r="3"/>
                    <path d="M12 2v3M12 19v3M2 12h3M19 12h3"/>
                </svg>
                Usar mi ubicación
            </button>
        </div>

        <!-- ── Panel de filtros ── -->
        <div class="filter-panel">
            <div class="filter-panel-title">
                Filtros
                <span id="filterActiveDot" class="filter-active-dot" style="display:none;"></span>
            </div>

            <div class="filter-group">
                <label for="filterSport">🏅 Deporte</label>
                <input type="text" id="filterSport" placeholder="Ej: boxeo, yoga, spinning...">
            </div>

            <div class="filter-group">
                <label for="filterMaterial">🏋️ Material</label>
                <input type="text" id="filterMaterial" placeholder="Ej: mancuernas, bicicletas...">
            </div>

            <div class="filter-group">
                <label>💶 Precio de actividades (€)</label>
                <div class="price-range-row">
                    <input type="number" id="filterPriceMin" placeholder="Mín" min="0">
                    <span class="price-range-sep">—</span>
                    <input type="number" id="filterPriceMax" placeholder="Máx" min="0">
                </div>
            </div>

            <button class="filter-reset-btn" id="filterResetBtn">Limpiar filtros</button>
        </div>

    </aside>

    <section class="right-panel">

        <div class="search-bar-wrapper">
            <div class="search-bar">
                <button class="search-filter-btn" title="Filtros">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="3" y1="6" x2="21" y2="6"/>
                        <line x1="7" y1="12" x2="17" y2="12"/>
                        <line x1="10" y1="18" x2="14" y2="18"/>
                    </svg>
                </button>
                <input type="text" id="searchInput" class="search-input" placeholder="Busca gimnasios o entrenadores cerca de ti...">
                <button class="search-clear-btn hidden" id="searchClearBtn" title="Limpiar">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
                        <line x1="18" y1="6" x2="6" y2="18"/>
                        <line x1="6" y1="6" x2="18" y2="18"/>
                    </svg>
                </button>
                <button class="search-location-btn" id="searchLocationBtn" title="Buscar por ubicación">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z"/>
                        <circle cx="12" cy="9" r="2.5"/>
                    </svg>
                </button>
                <button class="search-submit-btn" id="searchSubmitBtn" title="Buscar">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
                        <circle cx="11" cy="11" r="7"/>
                        <line x1="21" y1="21" x2="16.65" y2="16.65"/>
                    </svg>
                </button>
            </div>

            <div class="filter-chips">
                <button class="chip chip--active" data-filter="todos">Todos</button>
                <button class="chip" data-filter="gym">Gimnasios</button>
                <button class="chip" data-filter="professional">Entrenadores</button>
            </div>
        </div>

        <div id="statusMsg" class="status-msg" style="display:none;"></div>

        <div class="results-list" id="resultsList">
            <p class="no-results">Pulsa "Usar mi ubicación" para buscar cerca de ti.</p>
        </div>

    </section>

</main>

<!-- Modal mapa ampliado -->
<div class="map-modal-overlay" id="mapModalOverlay">
    <div class="map-modal-inner">
        <button class="map-modal-close" id="mapModalClose">✕</button>
        <div id="mapBig"></div>
    </div>
</div>

<footer xlu-include-file="components/Footer.html"></footer>

<script src="javascript/scripts/xlu-include-file.js"></script>
<script>xLuIncludeFile();</script>


</body>
</html>
