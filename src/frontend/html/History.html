<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>History</title>
    <link rel="stylesheet" href="../css/History.css">
    <link rel="stylesheet" href="../css/components/Header.css">
    <link rel="stylesheet" href="../css/components/Footer.css">
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
    <script>emailjs.init("bOhMQRr1h4BzhaNUT");</script>
    <style>
        .reservation-card {
            position: relative;
        }

        /* ── Widget de valoración ── */
        .rating-widget {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 12px;
            margin: 8px 0 4px;
            background: #fafafa;
            border: 1.5px solid #eee;
            border-radius: 10px;
            flex-wrap: wrap;
        }
        .rating-widget--done {
            background: #f0faf0;
            border-color: #c3e6c3;
            cursor: default;
        }
        .rating-widget-label {
            font-size: 0.82rem;
            color: #555;
            font-weight: 500;
            white-space: nowrap;
        }
        .rating-stars {
            display: flex;
            gap: 3px;
        }
        .rating-star {
            font-size: 1.5rem;
            color: #ddd;
            cursor: pointer;
            transition: color 0.12s, transform 0.1s;
            line-height: 1;
            user-select: none;
        }
        .rating-star:hover,
        .rating-star--active {
            color: #f1c40f;
            transform: scale(1.15);
        }
        .rating-widget--done .rating-widget-label {
            color: #2e7d32;
            font-weight: 600;
        }
    </style>
</head>
<body>
<header xlu-include-file="components/Header.html"></header>

<main class="reservations-main">

    <div class="section-header">
        <button class="back-btn" onclick="history.back()">&#8592;</button>
        <h2>Reservas activas:</h2>
    </div>
    <div class="cards-container-car" id="activeList">
        <p class="loading-hint">Cargando...</p>
    </div>

    <div class="section-header past-header">
        <h2>Reservas pasadas:</h2>
        <button id="deleteAllPastBtn" title="Eliminar todas las reservas pasadas" style="background:none;border:none;cursor:pointer;color:black;display:flex;align-items:center;padding:4px;border-radius:6px;transition:color 0.15s;">
            <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2">
                <polyline points="3 6 5 6 21 6"/>
                <path d="M19 6l-1 14H6L5 6"/>
                <path d="M10 11v6M14 11v6"/>
                <path d="M9 6V4h6v2"/>
            </svg>
        </button>
    </div>
    <div class="cards-container" id="pastList">
        <p class="loading-hint">Cargando...</p>
    </div>

</main>

<footer xlu-include-file="components/Footer.html"></footer>

<script type="module" src="../javascript/scripts/auth-guard.js"></script>
<script src="../javascript/scripts/xlu-include-file.js"></script>
<script type="module" src="../javascript/scripts/Header.js"></script>
<script type="module" src="../javascript/pages/History.js"></script>
<script>xLuIncludeFile();</script>
</body>
</html>
