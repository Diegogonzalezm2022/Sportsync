<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Administración - SportSync</title>
    <link rel="stylesheet" href="../css/GymPage.css">
    <link rel="stylesheet" href="../css/components/Header.css">
    <link rel="stylesheet" href="../css/components/Footer.css">
    <style>
        .admin-container {
            max-width: 1000px;
            margin: 40px auto;
            padding: 20px;
            font-family: 'Inter', sans-serif;
        }
        .admin-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }
        .search-box {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
        }
        .search-input {
            flex: 1;
            padding: 12px 20px;
            border: 1.5px solid #eee;
            border-radius: 10px;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.2s;
        }
        .search-input:focus {
            border-color: #1a1a1a;
        }
        .users-table-container {
            background: white;
            border-radius: 15px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
            overflow: hidden;
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th {
            background: #f9f9f9;
            text-align: left;
            padding: 15px 20px;
            font-size: 0.9rem;
            color: #666;
            font-weight: 600;
            border-bottom: 1px solid #eee;
        }
        td {
            padding: 15px 20px;
            border-bottom: 1px solid #eee;
            font-size: 0.95rem;
            vertical-align: middle;
        }
        .user-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .user-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: #f0f0f0;
            object-fit: cover;
        }
        .role-badge {
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
        }
        .role-admin { background: #e3f2fd; color: #1976d2; }
        .role-gym { background: #f3e5f5; color: #7b1fa2; }
        .role-professional { background: #e8f5e9; color: #388e3c; }
        .role-user { background: #fff3e0; color: #f57c00; }

        .actions-btns {
            display: flex;
            gap: 8px;
        }
        .action-btn {
            padding: 8px 12px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.85rem;
            transition: opacity 0.2s;
        }
        .edit-btn { background: #1a1a1a; color: white; }
        .delete-btn { background: #ff4d4d; color: white; }
        .action-btn:hover { opacity: 0.8; }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }
        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 20px;
            width: 100%;
            max-width: 500px;
            max-height: 90vh;
            overflow-y: auto;
        }
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .close-modal {
            background: none;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
        }
        .form-group {
            margin-bottom: 15px;
        }
        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-size: 0.9rem;
            color: #555;
        }
        .form-group input, .form-group select, .form-group textarea {
            width: 100%;
            padding: 10px;
            border: 1.5px solid #eee;
            border-radius: 8px;
            outline: none;
        }
        .save-btn {
            width: 100%;
            padding: 12px;
            background: #1a1a1a;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
            margin-top: 10px;
        }
    </style>
</head>
<body class="page--admin">

<header xlu-include-file="components/Header.html"></header>

<main class="admin-container">
    <div class="admin-header">
        <h1>Panel de Administración</h1>
    </div>

    <div class="search-box">
        <input type="text" id="userSearch" class="search-input" placeholder="Buscar por nombre, email o username...">
    </div>

    <div class="users-table-container">
        <table>
            <thead>
                <tr>
                    <th>Usuario</th>
                    <th>Email</th>
                    <th>Rol</th>
                    <th>Acciones</th>
                </tr>
            </thead>
            <tbody id="usersList">
                <!-- Se rellena con JS -->
                <tr>
                    <td colspan="4" style="text-align:center; color:#999;">Cargando usuarios...</td>
                </tr>
            </tbody>
        </table>
    </div>
</main>

<!-- Modal Edición -->
<div id="editModal" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <h3>Editar Usuario</h3>
            <button class="close-modal" id="closeModal">&times;</button>
        </div>
        <form id="editUserForm">
            <input type="hidden" id="editUserId">
            <div class="form-group">
                <label>Nombre</label>
                <input type="text" id="editName">
            </div>
            <div class="form-group">
                <label>Username</label>
                <input type="text" id="editUsername">
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="editEmail" readonly style="background:#f5f5f5;">
            </div>
            <div class="form-group">
                <label>Rol</label>
                <select id="editRole">
                    <option value="user">Usuario</option>
                    <option value="gym">Gimnasio</option>
                    <option value="professional">Profesional</option>
                    <option value="admin">Administrador</option>
                </select>
            </div>
            <div class="form-group">
                <label>Biografía</label>
                <textarea id="editBio" rows="3"></textarea>
            </div>
            <button type="submit" class="save-btn">Guardar Cambios</button>
        </form>
    </div>
</div>

<footer xlu-include-file="components/Footer.html"></footer>

<script src="../javascript/scripts/xlu-include-file.js"></script>
<script>xLuIncludeFile();</script>
<script type="module" src="../javascript/scripts/Header.js"></script>
<script type="module" src="../javascript/pages/AdminPage.js"></script>

</body>
</html>
