services:
  backend:
    build:
      context: .
      dockerfile: src/backend/Dockerfile
    container_name: sportsync-backend
    ports:
      - "3000:3000"
    volumes:
      - ./src/backend:/app
      - /app/node_modules
      - ./src/assets:/assets
    environment:
      - PORT=3000
    networks:
      - sportsync-net
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: src/frontend/Dockerfile
    container_name: sportsync-frontend
    ports:
      - "8080:80"
    volumes:
      - ./src/frontend:/usr/share/nginx/html/frontend
      - ./src/assets:/usr/share/nginx/html/assets
    depends_on:
      - backend
    networks:
      - sportsync-net
    restart: unless-stopped

networks:
  sportsync-net:
    driver: bridge
