services:
  backend:
    build:
      context: .
      dockerfile: src/backend/Dockerfile
    container_name: sportsync-backend
    # Exposing the port is optional, since the frontend Nginx proxies to it.
    # We map it to localhost:3000 just in case you want to test the API directly using Postman.
    # To truly "protect" it, you can comment out the ports section.
    ports:
      - "3000:3000"
    volumes:
      - ./src/backend:/app
      - /app/node_modules
      - ./src/assets:/assets
    environment:
      - PORT=3000
    networks:
      - sportsync-net
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: src/frontend/Dockerfile
    container_name: sportsync-frontend
    ports:
      - "8080:80"
    volumes:
      - ./src/frontend:/usr/share/nginx/html/frontend
      - ./src/assets:/usr/share/nginx/html/assets
    depends_on:
      - backend
    networks:
      - sportsync-net
    restart: unless-stopped

networks:
  sportsync-net:
    driver: bridge
